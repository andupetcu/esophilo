<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
:root{--bg1:#0f0c29;--bg2:#1a1040;--bg3:#24243e;--p1:#a78bfa;--p2:#c9a0ff;--p3:#f0c0ff;--t1:#e0d6f0;--t2:#9a8cbf;--t3:#7a6a9a;--cb:rgba(255,255,255,0.04);--cbo:rgba(180,140,255,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));min-height:100vh;color:var(--t1);padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);-webkit-user-select:none;user-select:text;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(2px 2px at 20px 30px,#fff2,transparent),radial-gradient(2px 2px at 40px 70px,#fff1,transparent),radial-gradient(1px 1px at 90px 40px,#fff1,transparent);background-size:200px 200px;animation:tw 4s ease-in-out infinite alternate}
@keyframes tw{from{opacity:.5}to{opacity:1}}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:30px 20px}
header{text-align:center;margin-bottom:40px}
header .ico{font-size:56px;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(180,140,255,.5))}
header h1{font-family:'Cormorant Garamond',serif;font-size:2.8em;font-weight:700;background:linear-gradient(135deg,var(--p2),var(--p3),var(--p1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px}
header p{font-size:.95em;color:var(--t2);margin-top:6px;font-weight:300;letter-spacing:1px}
.search{background:rgba(255,255,255,.05);border:1px solid rgba(180,140,255,.15);border-radius:20px;padding:30px;backdrop-filter:blur(10px);margin-bottom:30px}
.search>label{display:block;font-size:.85em;color:#b09ad8;margin-bottom:10px;font-weight:500;letter-spacing:.5px}
.row{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
.ig{flex:1;min-width:120px}
.ig label{display:block;font-size:.75em;text-transform:uppercase;letter-spacing:1.5px;color:#8a7aaa;margin-bottom:6px}
.ig input[type=number]{width:100%;padding:14px 18px;background:rgba(255,255,255,.07);border:1px solid rgba(180,140,255,.2);border-radius:12px;color:#f0e6ff;font-size:1.3em;text-align:center;font-family:'Cormorant Garamond',serif;font-weight:600;transition:all .3s;outline:0}
.ig input:focus{border-color:var(--p1);box-shadow:0 0 20px rgba(167,139,250,.2);background:rgba(255,255,255,.1)}
.ig input::placeholder{color:#6a5a8a;font-weight:300}
.plus{font-family:'Cormorant Garamond',serif;font-size:2em;color:var(--p1);padding-top:20px;font-weight:600}
.btn{padding:14px 35px;margin-top:20px;background:linear-gradient(135deg,#7c3aed,var(--p1));border:none;border-radius:12px;color:#fff;font-size:1em;font-weight:500;cursor:pointer;transition:all .3s;width:100%;letter-spacing:1px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,.4)}
.div{text-align:center;color:#6a5a8a;margin:20px 0;font-size:.8em;letter-spacing:2px}
.tsi{width:100%;padding:12px 18px;background:rgba(255,255,255,.07);border:1px solid rgba(180,140,255,.2);border-radius:12px;color:#f0e6ff;font-size:.95em;transition:all .3s;outline:0}
.tsi:focus{border-color:var(--p1);box-shadow:0 0 20px rgba(167,139,250,.2)}
.tsi::placeholder{color:#6a5a8a}
.results{display:flex;flex-direction:column;gap:16px}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.cc{background:var(--cb);border:1px solid var(--cbo);border-radius:16px;padding:22px 25px;transition:all .3s;animation:fi .4s ease-out}
.cc:hover{border-color:rgba(180,140,255,.3);background:rgba(255,255,255,.07)}
.ch{display:flex;align-items:center;gap:15px;margin-bottom:12px}
.cn{font-family:'Cormorant Garamond',serif;font-size:1.8em;font-weight:700;background:linear-gradient(135deg,var(--p2),var(--p1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.cnames{font-size:.8em;color:var(--t2);font-weight:400}
.cd{font-size:1.05em;line-height:1.7;color:#d4c0ff;font-weight:300}
.nr{text-align:center;padding:50px 20px;color:var(--t3)}
.nr .i{font-size:48px;margin-bottom:15px;opacity:.5}
.sl{font-size:.78em;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin:28px 0 14px;padding-left:4px}
.cp{background:rgba(255,255,255,.03);border:1px solid rgba(180,140,255,.12);border-radius:20px;overflow:hidden;animation:fi .5s ease-out;margin-bottom:5px}
.cph{display:flex;align-items:center;gap:16px;padding:22px 28px;background:rgba(167,139,250,.06);border-bottom:1px solid rgba(180,140,255,.08);cursor:pointer;transition:background .2s}
.cph:hover{background:rgba(167,139,250,.1)}
.cpn{font-family:'Cormorant Garamond',serif;font-size:2.2em;font-weight:700;background:linear-gradient(135deg,var(--p2),var(--p3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.cpta{flex:1}
.cpt{font-family:'Cormorant Garamond',serif;font-size:1.5em;font-weight:600;color:#d4c0ff}
.cps{font-size:.8em;color:var(--t2);margin-top:3px;line-height:1.4}
.cpx{font-size:1.2em;color:var(--t3);transition:transform .3s}
.cpx.open{transform:rotate(180deg)}
.cpb{max-height:0;overflow:hidden;transition:max-height .5s ease-out}
.cpb.open{max-height:8000px}
.cpi{padding:24px 28px}
.intro{font-size:.95em;line-height:1.8;color:#c0b0e0;margin-bottom:22px;font-weight:300}
.kw{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.1);border-radius:14px;padding:16px 20px;margin-bottom:24px}
.kwl{font-size:.68em;text-transform:uppercase;letter-spacing:1.8px;color:var(--p1);margin-bottom:10px;font-weight:600}

+11": "abuz fizic, conflict dureros, ciclu violent.", "36+12": "conversații grele, terapie, sfat cu impact emoțional.", "36+13": "copil spiritual, naștere dureroasă, renaștere interioară.", "36+14": "muncă dificilă, atașamente toxice, dependențe.", "36+15": "aliat puternic, dar cu un preț; presiune financiară.", "36+16": "rugăciune, destin, credință în ceva mai mare.", "36+17": "schimbare inevitabilă, tranziție menită să te vindece.", "36+18": "sprijin de la un prieten, ghid, consilier.", "36+19": "autoritate apăsătoare, sarcini impuse de instituții.", "36+20": "rețea de sprijin, întâlniri karmice, locuri funerare.", "36+21": "izolare, gânduri întunecate, gol interior.", "36+22": "decizie dureroasă, despărțire necesară.", "36+23": "epuizare emoțională, colaps psihic, depresie.", "36+24": "suferință în iubire, legătură predestinată.", "36+25": "angajament dureros, relație complicată, regrete.", "36+26": "documente sacre, adevăruri ascunse, credințe apăsătoare.", "36+27": "veste grea, mesaj inevitabil, informație dureroasă.", "36+28": "bărbat spiritual sau copleșit, sentiment de vină.", "36+29": "femeie empatică, epuizată, în căutarea sensului.", "36+30": "disfuncții, dureri legate de îmbătrânire sau trecut.", "36+31": "succes meritat după suferință, destin împlinit.", "36+32": "recunoaștere obținută cu sacrificii, renunțări grele.", "36+33": "lecție de destin, adevăr profund care schimbă direcția.", "36+34": "cauze umanitare, proiecte spirituale, poveri financiare.", "36+35": "muncă grea, efort susținut, menire cu obstacole."}, "d": {"17": {"intro": ["Cartea numărul 17, Schimbarea, este mesagerul mișcării și al tranzițiilor. Este o carte dinamică, asociată cu relocarea, progresul și adesea cu îmbunătățirile și noile începuturi care vin odată cu schimbarea, inclusiv nașterea."], "keywords": ["Schimbare (adesea pozitivă, dorită sau necesară), Transformare, Tranziție, Modificare", "Mișcare, Deplasare, Mutare (de casă, de loc de muncă), Relocare, Transfer", "Călătorie (în special cu avionul, pe distanțe mai mari, migrație)", "Îmbunătățire, Progres, Avansare, Upgrade, Evoluție", "Noi începuturi (ca rezultat al schimbării), Reînnoire", "Sarcină, Naștere, Fertilitate, Sosirea unui copil (literal sau simbolic - un proiect nou)", "Flexibilitate, Adaptabilitate, Schimbare de perspectivă", "Cicluri, Anotimpuri (în special primăvara - renaștere, toamna - migrație)", "Noutăți care aduc schimbare, Actualizări", "Picioare lungi (simbolic - grație, mișcare), Zbor"], "general": ["Cartea 17 anunță în primul rând schimbarea și mișcarea. Este indicatorul principal pentru mutarea locuinței sau relocare, dar semnificația sa se extinde la orice fel de tranziție importantă în viață – fie că este vorba de carieră, relații sau perspective personale. Vestea bună este că schimbarea adusă de această carte este adesea una pozitivă, semnificând progres, îmbunătățire sau un \"upgrade\" față de situația anterioară. Este o carte a dinamismului și a avansării. În mod tradițional și foarte frecvent, Schimbarea este asociată direct cu sarcina și nașterea, fiind un prevestitor al sosirii unui copil. Pe lângă acestea, reprezintă nevoia de flexibilitate și adaptabilitate în fața circumstanțelor în schimbare. Energia sa este mobilă, fluidă, orientată spre viitor și aduce un suflu de reînnoire."], "love": ["Schimbări importante în dinamica relației, adesea pozitive. Trecerea la un nou nivel de angajament.", "Planuri concrete sau realizarea mutării împreună. Schimbarea domiciliului pentru a fi cu partenerul.", "Indicație puternică pentru sarcină, dorința de a avea copii sau sosirea efectivă a unui copil în cuplu.", "Nevoia ca partenerii să fie flexibili și să se adapteze la noile etape sau circumstanțe ale relației.", "O îmbunătățire a comunicării sau a armoniei în cuplu, o reînnoire a sentimentelor."], "career": ["Schimbarea locului de muncă, acceptarea unei noi oferte, transferul într-un alt departament sau locație. Promovare.", "Relocarea biroului, a sediului companiei sau relocarea personală impusă de carieră.", "Schimbări pozitive în mediul de lucru, implementarea unor noi strategii sau tehnologii care aduc progres. Noi responsabilități.", "Lansarea unor proiecte noi și dinamice, care implică inovație și schimbare.", "Necesită adaptabilitate la un nou rol, noi colegi sau noi metode de lucru."], "health": ["Schimbări în starea de sănătate, de cele mai multe ori indicând o îmbunătățire, începutul recuperării, depășirea unei faze dificile.", "Schimbarea tratamentului, a medicului curant sau a abordării terapeutice, adesea cu rezultate mai bune.", "Una dintre principalele cărți pentru sarcină și naștere. Poate viza și sănătatea reproductivă sau ciclurile hormonale feminine.", "Simbolic, poate fi legată de membrele inferioare (picioare).", "Necesitatea de a adapta stilul de viață (dietă, exerciții) pentru a susține schimbările pozitive în sănătate."], "money": ["Schimbări în situația financiară, de obicei în bine – o creștere a veniturilor, o nouă sursă de bani, un \"upgrade\" financiar.", "Fluctuații care cer flexibilitate în administrarea banilor. Adaptarea bugetului la noile condiții.", "Cheltuieli sau venituri legate de mutare, călătorii sau de venirea unui copil.", "Oportunități de progres financiar prin acceptarea schimbării sau a unor noi direcții."], "home": ["Mutarea într-o casă nouă. Cartea principală a relocării rezidențiale.", "Schimbări în structura familiei: nașterea unui copil, un membru al familiei se mută în casă sau pleacă (ex: la studii).", "Renovări majore, reamenajări semnificative care transformă locuința.", "Nevoia de adaptare a tuturor membrilor la noua configurație familială sau la noul cămin. Flexibilitate în regulile casei."], "social": ["Schimbări în cercul de prieteni: prieteni care pleacă (se mută), apariția unor noi prieteni interesanți, adesea ca urmare a unei schimbări personale (job nou, casă nouă).", "Nevoia de a te adapta la noi grupuri sociale sau la schimbări în relațiile cu vechii prieteni.", "Activități sociale care implică mișcare, călătorii sau evenimente legate de schimbări (petrecere de casă nouă)."], "travel": ["Indicație clară pentru călătorii, în special cele aeriene sau cele care implică o schimbare majoră de locație (relocare, migrație).", "Reprezintă actul de a te muta dintr-un loc în altul.", "Poate semnala schimbări benefice în planurile de călătorie (un upgrade la bilet, o oportunitate neașteptată de a pleca).", "Călătorii asociate cu noi începuturi sau tranziții importante în viață."], "study": ["Schimbarea instituției de învățământ, a specializării sau chiar a țării pentru studii.", "Progres vizibil în studii, trecerea la un nivel superior, absolvirea unei etape și începerea alteia.", "Necesitatea de a te adapta rapid la un nou mediu academic, noi profesori, noi cerințe.", "Învățarea unor subiecte legate de migrație, geografie, aviație, biologie (reproducere), managementul schimbării."], "spiritual": ["O perioadă de transformare spirituală semnificativă, de schimbare a convingerilor sau a nivelului de conștiință. Evoluție.", "Necesitatea de a fi flexibil și adaptabil pe calea spirituală, de a renunța la dogme rigide și de a îmbrățișa noi perspective.", "Explorarea unor noi practici sau direcții spirituale. Integrarea schimbărilor interioare.", "Conștientizarea ciclurilor din viața spirituală și a importanței reînnoirii."], "time": ["Indică o perioadă de tranziție și schimbare. Momentul schimbării este apropiat sau în curs.", "Adesea legată de schimbările de anotimp, în special primăvara (renaștere, sosire) și toamna (plecare, migrație).", "Durata depinde de amploarea schimbării, dar implică mișcare spre viitor. Poate fi vorba de luni (cele 9 luni de sarcină, un an academic etc.).", "Uneori asociată cu cifra 17."], "advice": ["al Cărții: Fii pregătit pentru schimbare și îmbrățișeaz-o cu flexibilitate! Schimbarea anunță mișcare, tranziție și noi începuturi, adesea aducând îmbunătățiri și progres. Nu te împotrivi valului schimbării; adaptează-te, fii deschis la relocare (fizică sau metaforică) și privește spre viitor cu optimism. Este timpul să îți iei zborul spre noi orizonturi! FELICITĂRI! ai aprofundat informațiile despre Cartea 17 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "6": {"intro": ["Cartea cu numărul 6, Ambiguitatea, transmite o energie de incertitudine, confuzie și absență a clarității. Prezența Ambiguității într-o etalare este un semnal că viziunea asupra unei situații este temporar încețoșată sau obstrucționată."], "keywords": ["Confuzie, Incertitudine, Nelămurire, Ambiguitațe, Nebulozitate", "Lipsă de claritate, Viziune încețoșată, Obscuritate, Ceață", "Probleme (adesea temporare), Complicații, Dificultăți, Încurcături", "Îndoială, Neîncredere, Nesiguranță, Anxietate (ușoară)", "Neînțelegeri, Comunicare defectuoasă, Mesaje neclare", "Negativitate (temporară), Tristețe, Dispoziție proastă, Pesimism", "Obstacole, Întârzieri (cauzate de confuzie), Blocaje temporare", "Vreme rea (literal sau metaforic), Fum, Poluare, Aer încărcat", "Fost partener (adesea masculin), O persoană dificilă/negativă, Influențe externe tulburătoare"], "general": ["Cartea 6, Ambiguitatea, este un avertisment clasic legat de lipsa de claritate și confuzie. Indică o perioadă în care lucrurile nu sunt ceea ce par, informațiile sunt contradictorii sau incomplete, iar judecata poate fi afectată de incertitudine și îndoială. Situația descrisă este obscură, ca și cum ar fi acoperită de o ceață densă. Acest lucru poate duce la neînțelegeri, complicații sau probleme temporare. Adesea, Ambiguitatea aduce cu ea o stare de neliniște, tristețe sau o perspectivă negativă, dar este important de reținut că această stare este, de obicei, trecătoare – la fel cum norii de pe cer se risipesc în cele din urmă. Cartea poate, de asemenea, să reprezinte influența perturbatoare a unei persoane din exterior, tradițional un fost partener (în special bărbat) sau o figură autoritară dificilă, care aduce confuzie sau negativitate în viața consultantului. Sfatul primordial al Ambiguității este prudența și amânarea deciziilor majore până când perspectiva devine din nou limpede."], "love": ["Perioadă de confuzie și incertitudine în relație. Sentimente amestecate, îndoieli legate de partener sau de viitorul comun.", "Neînțelegeri frecvente, comunicare defectuoasă, dificultatea de a vedea clar intențiile celuilalt.", "Atmosferă tensionată, posibile certuri sau stări de tristețe în cuplu. Nesiguranță emoțională.", "Poate semnala influența negativă a unui fost partener care încă bântuie relația sau a altor persoane care \"încețoșează\" armonia.", "Nu este momentul pentru decizii radicale (căsătorie, despărțire, mutatul împreună)."], "career": ["Lipsă de claritate privind sarcinile, obiectivele proiectelor sau direcția generală a companiei/carierei. Incertitudine legată de stabilitatea locului de muncă.", "Comunicare defectuoasă cu superiorii sau colegii, instrucțiuni ambigue, risc de erori din cauza neînțelegerilor.", "Un mediu de lucru confuz, stresant sau chiar toxic. Posibile probleme ascunse sau complicații neprevăzute în proiecte.", "Îndoieli personale legate de alegerea carierei sau de satisfacția profesională. Sentimentul de a fi \"în ceață\" profesional."], "health": ["Diagnostic dificil sau incert. Simptome neclare, ambigue, care îngreunează identificarea problemei.", "Confuzie în legătură cu planul de tratament, efectele medicamentelor sau recomandările medicale. Nevoia unei a doua opinii.", "Stare de ceață mentală (brain fog), lipsă de concentrare, memorie slabă, dificultăți cognitive temporare.", "Poate indica stări de anxietate, neliniște, tristețe trecătoare sau predispoziție la depresie.", "Uneori asociată cu afecțiuni respiratorii, probleme legate de plămâni, alergii sau sensibilitate la poluare/fum."], "money": ["Situație financiară neclară, dificultatea de a avea o imagine de ansamblu corectă asupra veniturilor și cheltuielilor.", "Incertitudine legată de investiții, tranzacții neclare, posibile costuri ascunse sau taxe neprevăzute.", "Risc de confuzie în documente financiare sau neînțelegeri legate de bani.", "Sfatul clar de a evita deciziile financiare majore, semnarea de contracte importante sau investițiile riscante în această perioadă."], "home": ["Atmosferă confuză, tensionată sau neclară în cămin. Neînțelegeri, secrete sau probleme nespuse între membrii familiei.", "Incertitudine legată de locuință (probleme structurale ascunse, situație juridică ambiguă, planuri de mutare neclare).", "Influența perturbatoare a unei rude dificile sau a unui fost partener asupra vieții de familie.", "Dificultatea de a lua decizii clare legate de familie sau gospodărie."], "social": ["Neînțelegeri cu prietenii, situații sociale ambigue, conversații cu dublu înțeles.", "Bârfe sau informații contradictorii care creează confuzie și tensiune în grupul de prieteni.", "Îndoieli cu privire la loialitatea sau intențiile unor prieteni. Sentimentul de a nu ști pe cine să crezi.", "Tendința de a evita socializarea intensă până la clarificarea situațiilor."], "travel": ["Planuri de călătorie incerte, posibilitatea de amânare sau anulare.", "Risc crescut de complicații, întârzieri, pierderea bagajelor sau probleme legate de vremea rea.", "Confuzie privind ruta, orarul, rezervările sau documentele de călătorie.", "Este recomandată verificarea atentă a tuturor detaliilor și, dacă este posibil, amânarea călătoriilor non-esențiale."], "study": ["Dificultăți majore în înțelegerea materiei, senzația că informația este prea complexă sau neclară.", "Instrucțiuni ambigue de la profesori, materiale de curs confuze sau contradictorii.", "Lipsă de claritate privind direcția de studiu, cerințele examenelor sau viitorul academic.", "Dificultăți de concentrare, \"ceață mentală\" care împiedică asimilarea eficientă."], "spiritual": ["Perioadă de îndoială și confuzie spirituală. Întrebări existențiale fără răspunsuri clare.", "Dificultatea de a medita, de a se conecta sau de a primi ghidare spirituală limpede. Senzația de a fi deconectat.", "Poate reprezenta o fază necesară de incertitudine (\"noaptea întunecată a sufletului\") care precede o nouă înțelegere.", "Nevoia de introspecție liniștită și de a aștepta ca mesajele să devină mai clare, fără a forța."], "time": ["Indică o perioadă de incertitudine și lipsă de claritate, a cărei durată este, prin natura cărții, neclară.", "Sugerează întârzieri în rezolvarea problemelor sau în primirea răspunsurilor.", "Efectul este temporar, dar poate dura de la câteva zile la câteva săptămâni, până când \"norii se risipesc\". Depinde mult de cărțile vecine.", "Uneori asociată cu cifra 6 sau cu perioadele cu vreme instabilă (toamnă, început de primăvară)."], "advice": ["al Cărții: Ai răbdare și așteaptă claritatea! Ambiguitatea te avertizează că acum nu este momentul pentru decizii pripite sau acțiuni majore. Situația este confuză, informațiile pot fi înșelătoare, iar judecata îți poate fi afectată. Cel mai bun curs de acțiune este să observi, să aduni informații (dacă poți), dar să amâni deciziile importante până când perspectiva devine limpede și certă. Fii conștient că această perioadă de incertitudine este trecătoare. FELICITĂRI! ai aprofundat informațiile despre Cartea 6, acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "30": {"intro": ["Cartea numărul 30, Puritatea, este un simbol al virtuții, păcii interioare, dar și al maturității și înțelepciunii dobândite prin experiență. Această carte are o energie calmă, rafinată și adesea legată de figuri paterne sau de mentori."], "keywords": ["Pace, Liniște, Calm, Serenitate, Armonie, Liniște interioară", "Puritate, Virtute, Moralitate, Etică, Integritate, Onoare, Decență", "Maturitate, Înțelepciune (a vârstei), Experiență, Cumpătare", "Vârstă (înaintată), Bătrânețe, Pensionare, Seniorat", "Familie (în special părinți, bunici), Figurǎ paternǎ (tată, bunic, șef protector), Mentor, Protector (în vârstă, respectat)", "Sexualitate (matură, împlinită) SAU Castitate, Abstinență, Platonism (dualitate importantă, depinde de context)", "Contemplare, Meditație (calmă), Reflecție profundă", "Armonie, Echilibru (atins prin maturitate), Stabilitate calmă", "Iarnă (ca anotimp – liniște, răceală, puritate), Zăpadă", "Sprijin, Ajutor (necondiționat, înțelept, de la persoane mature/cu experiență)", "Rafinament, Eleganță (discretă)"], "general": ["Cartea 30, Crinul, aduce o vibrație de pace, calm și puritate. Este cartea virtuții, a moralității înalte și a integrității. Ea vorbește despre maturitate și înțelepciunea acumulată de-a lungul timpului, fiind adesea asociată cu persoane mai în vârstă, respectate, care pot oferi ghidare și protecție (în special figuri masculine/paterne, datorită asocierii cu Regele de Pică). Puritatea poate indica o perioadă de liniște interioară, de serenitate și armonie, sau chiar pensionarea după o viață de muncă. Un aspect distinctiv este dualitatea sa în interpretarea sexualității: poate semnifica o senzualitate matură, experimentată și rafinată, sau, în alte contexte, poate indica puritate, castitate, abstinență sau o relație platonică. Energia Purității este liniștită, matură, stabilă, etică și adesea percepută ca fiind ușor distantă sau rece (precum calmul iernii), dar într-un sens de demnitate și echilibru, nu neapărat negativ."], "love": ["O relație matură, pașnică, armonioasă, bazată pe respect profund și înțelegere reciprocă. Liniște și mulțumire în doi.", "Poate indica o legătură cu o persoană semnificativ mai în vârstă, înțeleaptă și protectoare.", "Sexualitatea este fie matură și împlinită, fie mai puțin importantă în relație, accentul căzând pe conexiunea sufletească și respect (contextul e cheia). Poate indica o perioadă de abstinență sau o relație platonică.", "Sprijin din partea familiei, în special a figurilor paterne sau a bunicilor, pentru relație. Relație văzută ca fiind \"virtuoasă\"."], "career": ["O carieră îndelungată, respectabilă, ajungerea la un nivel de maximă expertiză și recunoaștere bazată pe experiență. Pensionarea sau apropierea de aceasta.", "Un mediu de lucru calm, stabil, pașnic, cu standarde etice ridicate. Lipsa conflictelor majore.", "Prezența unui mentor valoros, a unui șef mai în vârstă, cu experiență, care oferă ghidare și protecție. Relații profesionale bazate pe respect.", "Importanța integrității și a moralității în activitatea profesională. Reputație impecabilă.", "Domenii potrivite: consultanță (pentru seniori), mentorat, medicină (geriatrie), asistență socială (vârstnici), domenii juridice (judecători), artă clasică, istorie."], "health": ["Probleme de sănătate asociate cu înaintarea în vârstă. Procese cronice, care necesită management pe termen lung.", "Nevoia stringentă de odihnă, pace, liniște și un mediu calm pentru recuperare sau menținerea echilibrului. Reducerea stresului este esențială.", "Poate atrage atenția asupra sănătății sexuale (libido scăzut/crescut în funcție de context, probleme hormonale legate de vârstă).", "Posibile probleme legate de vedere sau auz.", "O abordare calmă, răbdătoare și înțeleaptă a problemelor de sănătate. Acceptarea procesului natural de îmbătrânire."], "money": ["Securitate financiară obținută în timp, stabilitate materială la vârsta a treia. Pensie sau venituri din investiții pe termen lung.", "Liniște în privința banilor, lipsa stresului financiar major. Mulțumire cu situația actuală.", "Posibil sprijin financiar de la părinți, bunici sau alte rude în vârstă. Moșteniri.", "Etică și integritate în toate tranzacțiile financiare. Investiții conservatoare, sigure.", "Situație financiară stabilă care permite un trai liniștit și retras."], "home": ["Atmosferă de pace, armonie, respect și liniște în familie. Relații calme între membri.", "Rolul important al bunicilor sau al părinților în vârstă în viața de familie. Figura paternă respectată.", "Transmiterea tradițiilor și a valorilor morale solide în familie. Respect pentru înaintași.", "Perioada de pensionare, petrecută în liniștea căminului.", "Un cămin ordonat, curat, senin, un refugiu de pace."], "social": ["Prietenii cu persoane mature, înțelepte, de la care se pot învăța multe. Relații bazate pe respect mutual.", "Interacțiuni sociale calme, rafinate, lipsite de agitație sau superficialitate. Preferința pentru calitate în detrimentul cantității.", "Reputație bună, respect câștigat prin integritate și experiență.", "Căutarea păcii și a armoniei în relațiile de prietenie."], "travel": ["Călătorii liniștite, relaxante, în scop de odihnă sau contemplare (ex: la spa, mănăstiri, locuri retrase).", "Călătorii specifice pensionarilor.", "Deplasări pentru a vizita rude în vârstă.", "Preferința pentru călătorii lente, confortabile, fără grabă sau stres."], "study": ["Aprofundarea unor domenii care cer înțelepciune, maturitate și gândire profundă: filozofie, etică, istorie, teologie, arte clasice.", "Învățarea sub îndrumarea unui mentor respectat și cu vastă experiență.", "O perioadă de studiu calm, concentrat, fără presiunea timpului. Atingerea unui nivel de maestru.", "Aprecierea cunoașterii ca sursă de înțelepciune și pace interioară."], "spiritual": ["Atingerea unui nivel de pace interioară profundă, serenitate, detașare calmă. Înțelepciune spirituală.", "Practici spirituale bazate pe virtute, puritate, etică înaltă. Integritate spirituală.", "Conectarea cu înțelepciunea ancestrală, cu ghizi spirituali maturi sau cu arhetipul Înțeleptului / Bătrânului.", "Meditația, contemplația, rugăciunea liniștită ca practici centrale. Căutarea armoniei și a echilibrului interior.", "Mulțumire și împăcare cu propria cale spirituală."], "time": ["Indică o perioadă de timp lungă, adesea legată de maturitate, bătrânețe sau anotimpul iarna.", "Sugerează că lucrurile necesită răbdare și se așează într- un ritm lent, natural.", "Se referă la ceva stabil de mult timp, la durată și permanență (relativă).", "Poate indica o perioadă de calm sau așteptare senină. Uneori asociată cu cifra 30."], "advice": ["al Cărții: Caută pacea, acționează cu integritate și onorează înțelepciunea! Puritatea te sfătuiește să cultivi calmul și serenitatea în viața ta, să îți ghidezi acțiunile după principii morale și etice înalte. Prețuiește experiența (a ta sau a altora) și maturitatea. Fii răbdător, caută armonia și mulțumirea în stabilitate și liniște interioară. Este un timp pentru virtute și pace. FELICITĂRI! ai aprofundat informațiile despre Cartea 30 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "16": {"intro": ["Cartea numărul 16, Claritatea, luminează calea cu speranță, inspirație, ghidare și viziune. Este o carte profund pozitivă, asociată cu visele, aspirațiile și încrederea în viitor și în planul Universului."], "keywords": ["Speranță, Optimism, Încredere (în viitor, în Univers)", "Inspirație, Viziune, Claritate (mentală, spirituală), Iluminare (momentană)", "Ghidare, Direcție, Călăuzire (interioară sau exterioară), Orientare, Nord", "Vise, Aspirații, Obiective (înalte), Dorințe (împlinite sau spre împlinire)", "Succes (potențial, viitor), Recunoaștere, Renume, Faimă (uneori)", "Potențial, Viitor, Destin (direcție favorabilă), Plan divin", "Intuiție, Conexiune spirituală, Credință, Mesaje subtile", "Rețele (internet, sociale, neuronale, cosmice), Conexiuni multiple, Internet, Tehnologie", "Navigație, Orientare, Hărți (stelare sau metaforice), GPS", "Pace, Liniște (interioară), Seninătate, Vindecare (blândă, energetică)", "Astronomie, Astrologie, Spațiu cosmic, Univers, Vastitate"], "general": ["Cartea 16, Claritatea, este un far de lumină și speranță. Ea apare adesea pentru a aduce claritate după perioade de confuzie (Norii) și pentru a reaprinde optimismul și încrederea în viitor. Reprezintă visele noastre cele mai înalte, aspirațiile și obiectivele pe termen lung, sugerând că avem potențialul de a le atinge dacă ne păstrăm credința și urmăm ghidarea potrivită. Această ghidare poate veni din interior, prin intuiție, sau din exterior, prin mentori, semne sau chiar prin tehnologie și rețele (internet, astrologie). Stelele indică direcția corectă, ajutându-ne să navigăm spre scopurile noastre. Este o carte a inspirației, a viziunii extinse și a conexiunii cu ceva mai presus de noi înșine, fie că este vorba de Univers, Divinitate sau propriul destin favorabil. Poate anunța succes, recunoaștere sau pur și simplu o perioadă de pace interioară și vindecare blândă. Energia sa este expansivă, vizionară, plină de speranță și profund spirituală."], "love": ["Speranță reînnoită în dragoste, optimism cu privire la găsirea partenerului potrivit sau la viitorul relației.", "O relație inspirată, care se simte \"scrisă în stele\", aliniată cu aspirațiile profunde. Viziune comună asupra viitorului.", "Găsirea clarității sau primirea unei ghidări intuitive în problemele relaționale. Înțelegerea profundă a conexiunii.", "Posibilitatea unei legături predestinate sau karmice pozitive. Dragoste care inspiră creativitatea sau spiritualitatea.", "Manifestarea dorințelor amoroase. Încrederea că meriți o iubire împlinită."], "career": ["Stabilirea și urmărirea unor obiective profesionale ambițioase. Viziune clară asupra carierei dorite.", "Ghidare în alegerea drumului profesional, poate prin coaching, mentoring sau intuiție. Claritate asupra direcției de urmat.", "Potențial mare de succes, recunoaștere publică, vizibilitate în domeniu, posibil chiar faimă sau renume.", "Inspirație abundentă, idei inovatoare, viziune strategică pe termen lung.", "Domenii favorizate: tehnologie, IT, internet, social media, cercetare științifică (mai ales astronomie/fizică), astrologie, navigație, aviație, coaching, terapie, artă vizionară."], "health": ["Speranță puternică în vindecare, optimism care susține recuperarea. Efect placebo pozitiv.", "Vindecare blândă, adesea prin metode energetice, spirituale, terapii alternative (ex: cristaloterapie, Reiki) sau prin simpla conectare cu pacea interioară și credința.", "Găsirea ghidării potrivite către un tratament eficient sau un stil de viață benefic. Claritate după o perioadă de incertitudine medicală.", "Stare de pace mentală, seninătate, reducerea stresului prin conectare spirituală sau meditație, contribuind la sănătate."], "money": ["Optimism și speranță privind îmbunătățirea situației financiare. Încredere în viitorul financiar.", "Stabilirea unor obiective financiare clare și pe termen lung. Crearea unei viziuni a prosperității.", "Ghidare intuitivă sau sfaturi bune legate de investiții, planificare financiară. Claritate în decizii.", "Potențial de a atinge aspirațiile financiare, succes în afaceri (în special online sau tehnologice).", "Posibile venituri din domenii legate de tehnologie, internet, astrologie, consultanță, navigație."], "home": ["Speranță, optimism și o viziune pozitivă asupra viitorului familiei și al căminului.", "Atmosferă pașnică, liniștită, inspiratoare acasă.", "Ghidare și înțelepciune în cadrul familiei. Comunicare clară și vizionară.", "Folosirea tehnologiei și a internetului pentru a menține legătura cu familia aflată la distanță."], "social": ["Prieteni inspiraționali, care te ghidează sau îți împărtășesc viziunea. Mentori în cercul social.", "Apartenența la rețele sau grupuri (online sau offline) de oameni cu aceleași aspirații și interese. Networking de succes.", "Speranță și încredere în relațiile de prietenie. Claritate în dinamica socială.", "Evenimente sociale liniștite, plăcute, poate sub cerul liber sau cu tematică spirituală/științifică."], "travel": ["Navigație precisă (GPS, hărți, stele), găsirea direcției corecte.", "Călătorii pline de speranță, către destinații visate, pelerinaje sau călătorii cu scop inspirațional.", "Claritate în planurile de călătorie, organizare bună.", "Călătorii legate de tehnologie (conferințe IT), astronomie, cercetare sau pentru a primi ghidare spirituală/profesională."], "study": ["Inspirație și claritate deosebită în studiu. Înțelegerea conceptelor complexe.", "Stabilirea unor obiective academice înalte și încrederea în capacitatea de a le atinge.", "Ghidare valoroasă primită de la profesori, mentori sau prin intuiție.", "Succes în studierea astronomiei, astrologiei, fizicii, IT-ului, navigației, futurologiei, artelor vizionare, metafizicii.", "Succes la examene importante, atingerea aspirațiilor educaționale."], "spiritual": ["Cartea principală a ghidării spirituale, a intuiției clare, a conexiunii cu planurile superioare, cu ghizii spirituali sau cu Universul.", "Credință puternică, speranță nezdruncinată, optimism pe calea spirituală.", "Alinierea cu destinul personal, urmărirea misiunii sufletului. Claritate asupra scopului vieții.", "Interes profund și succes în astrologie, divinație, meditație, practici energetice.", "Stare de pace interioară profundă, seninătate, inspirație divină. Vindecare spirituală."], "time": ["Indică adesea noaptea (când se văd stelele).", "Se referă la viitorul pe termen lung și la calea către atingerea obiectivelor. Procesul necesită timp și urmărirea unei direcții.", "Nu este o carte a rapidității imediate, ci a progresului constant ghidat de viziune. Poate dura luni sau chiar mai mult pentru ca visele să se materializeze.", "Uneori asociată cu cifra 16 sau cu ideea de multitudine/infinit."], "advice": ["al Cărții: Ai încredere în visele tale și urmează-ți ghidarea interioară! Claritatea te încurajează să fii optimist, să îți stabilești obiective înalte și să crezi în capacitatea ta de a le atinge. Caută inspirația și claritatea, ascultă-ți intuiția și fii deschis la ghidarea care îți apare în cale. Păstrează-ți credința și navighează cu speranță spre viitorul pe care ți-l dorești! FELICITĂRI! ai aprofundat informațiile despre Cartea 16 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "19": {"intro": ["Cartea numărul 19, Autoritatea, este un simbol al structurii, instituțiilor oficiale, dar și al izolării, protecției și perspectivei înalte. Este o carte cu multiple fațete, ce vorbește despre granițe și sisteme."], "keywords": ["Autoritate, Putere (instituțională, oficială), Guvern, Stat, Oficialități", "Instituții (mari: corporații, spitale, școli/universități, bănci, primării, tribunale, închisori)", "Structură, Organizare, Ierarhie, Sistem, Ordin", "Birocrație, Reguli, Legi, Reglementări, Proceduri oficiale, Formalități", "Izolare, Singurătate, Separare, Distanțare (emoțională sau fizică), Retragere", "Protecție (ca o fortăreață), Apărare, Securitate (prin izolare sau structură)", "Granițe, Limite (clare, impuse sau autoimpuse), Ziduri", "Perspectivă (înaltă), Viziune de ansamblu, Obiectivitate, Detașare", "Ambiție, Scopuri înalte, Statut social/profesional înalt, Urcare (pe scara ierarhică)", "Durată lungă, Vechime, Istorie, Tradiție (instituțională), Clădiri vechi/înalte", "Ego (exacerbat), Aroganță (dată de poziție), Răceală, Rigiditate"], "general": ["Cartea 19, Autoritatea, aduce în discuție structurile care ne guvernează viața, fie ele externe (instituții, reguli), fie interne (granițe personale, ambiții). Reprezintă autoritatea sub toate formele ei – de la cea guvernamentală sau corporativă, până la cea parentală sau personală. Este cartea instituțiilor mari: clădiri oficiale, companii multinaționale, spitale, universități, sisteme juridice etc., și implică adesea interacțiunea cu birocrația și regulamentele. Pe un alt plan, Autoritatea vorbește despre izolare și separare. Poate indica o perioadă de singurătate (aleasă sau impusă), distanțare emoțională sau nevoia de a stabili granițe ferme pentru protecție. O altă fațetă importantă este cea a perspectivei: la fel cum dintr-un turn poți vedea departe, cartea sugerează capacitatea de a avea o viziune de ansamblu, obiectivă și detașată. Aceasta se leagă și de ambiție, de dorința de a atinge poziții înalte și de a avea o perspectivă superioară. În sens negativ, poate indica rigiditate, ego exacerbat, răceală sau blocaje cauzate de structuri prea restrictive. Energia sa este verticală, structurată, oficială, adesea impunătoare și distantă."], "love": ["Distanțare emoțională marcată în cuplu, sentiment de singurătate chiar și împreună. Lipsa intimității.", "Separare fizică sau divorț, adesea implicând proceduri oficiale sau instituții.", "Unul sau ambii parteneri stabilesc granițe foarte rigide, creând izolare. Relație ca o \"fortăreață\".", "Concentrarea excesivă a unuia dintre parteneri pe carieră și ambiții (Turnul), neglijând relația.", "Poate indica o relație cu o persoană aflată într-o poziție înaltă de autoritate, sau o diferență semnificativă de statut."], "career": ["Angajarea sau interacțiunea cu o companie foarte mare, o corporație, o instituție guvernamentală sau orice organizație cu structură ierarhică și birocratică.", "Respectarea strictă a regulilor, procedurilor și a ierarhiei. Navigarea prin birocrație.", "Ambiții profesionale înalte, dorința de a urca pe scara ierarhică, obținerea unei poziții de conducere sau a unei perspective strategice.", "Posibil lucru în izolare, autonomie mare sau, invers, sentimentul de a fi un simplu \"număr\" într-o structură mare. Separare de echipă.", "Probleme legale sau oficiale legate de muncă, necesitatea de a interacționa cu autoritățile din domeniu."], "health": ["Reprezintă clădirile medicale mari: spitale, clinici universitare, institute de cercetare. Poate indica spitalizare sau tratament instituționalizat.", "Perioadă de izolare necesară pentru vindecare (carantină, repaus la pat prelungit în spital).", "Probleme de sănătate care necesită consultarea unor autorități medicale sau parcurgerea unor proceduri birocratice (comisii, aprobări etc.).", "Simbolic, poate fi legată de coloana vertebrală, sistemul osos (structura corpului) sau de probleme asociate cu vârsta înaintată."], "money": ["Relații cu instituții financiare mari: bănci centrale sau comerciale, fonduri de investiții, autorități fiscale (ANAF), case de pensii.", "Necesitatea de a respecta reglementări financiare stricte, proceduri birocratice în chestiuni de bani.", "Ambiții financiare pe termen lung, planuri de acumulare de capital, investiții în structuri mari și stabile.", "Posibilă separare a patrimoniului (în caz de divorț) sau gestionarea finanțelor în mod izolat.", "Securitate financiară oferită de sisteme instituționalizate (pensii, asigurări de stat)."], "home": ["Sentimentul de singurătate sau izolare în cadrul familiei sau în propria locuință. Distanță emoțională față de membrii familiei.", "Locuința într-o clădire înaltă, un bloc turn, sau o proprietate cu ziduri înalte/garduri (indicând granițe).", "Stabilirea unor limite și reguli stricte în familie. Nevoia de spațiu personal bine definit.", "Interacțiuni cu autorități legate de casă (urbanism, cadastru) sau familie (protecția copilului, instanțe).", "Separarea fizică de familie (ex: plecarea la studii/muncă în alt oraș/țară și locuitul singur)."], "social": ["Tendința spre izolare socială, retragere, preferința pentru singurătate în detrimentul grupurilor mari.", "Distanțarea treptată sau bruscă de anumiți prieteni sau de cercul social anterior.", "Stabilirea unor granițe clare în prietenii, o anumită rezervă sau detașare emoțională.", "Socializare limitată la contexte formale, oficiale sau în cadrul unor organizații mari."], "travel": ["Călătorii în scopuri oficiale, guvernamentale, de afaceri (la sediul unei corporații etc.).", "Vizitarea unor orașe mari cu clădiri înalte, a unor monumente istorice impunătoare (cetăți, turnuri).", "Călătorii care presupun proceduri birocratice complexe (vize speciale, permise).", "Posibil sentiment de singurătate sau înstrăinare în timpul călătoriei. Preferința pentru a călători singur."], "study": ["Studii efectuate la universități mari, prestigioase, sau în instituții cu tradiție și structură ierarhică.", "Confruntarea cu regulamente academice stricte și proceduri birocratice.", "Aprofundarea unor domenii ca dreptul, administrația publică, istoria, arhitectura (clădiri înalte), managementul marilor organizații.", "Ambiții academice înalte, dorința de a atinge excelența sau o poziție de autoritate în domeniu.", "Perioade de studiu intens în izolare."], "spiritual": ["Căutarea izolării și a singurătății pentru aprofundarea practicii spirituale (retragere monastică, meditație solitară).", "Apartenența sau relația cu instituții spirituale/religioase structurate, cu ierarhii și dogme bine definite.", "Stabilirea unor granițe energetice puternice. Protecție spirituală.", "Atingerea unei perspective spirituale elevate, detașate, o înțelegere \"de sus\" a lucrurilor. \"Turnul de fildeș\" spiritual.", "Atenție la riscul de dogmatism, rigiditate în credințe sau ego spiritual (sentimentul de superioritate)."], "time": ["Indică o perioadă de timp lungă, ceva stabil de mult timp, cu istoric.", "Poate sugera întârzieri semnificative, adesea cauzate de procese birocratice sau instituționale.", "Se referă la trecut (clădiri vechi, tradiții) sau la planuri pe termen foarte lung (cariera într-o instituție).", "Poate indica o perioadă de izolare sau separare de durată.", "Asociată uneori cu cifra 19."], "advice": ["al Cărții: Caută perspectiva înaltă, stabilește granițe clare și navighează structurile existente. Autoritatea te încurajează să înțelegi regulile jocului în sistemele mari și să îți folosești ambiția pentru a urca. Este important să îți definești spațiul personal și să stabilești limite sănătoase, dar ai grijă ca acestea să nu ducă la izolare completă. Privește lucrurile de la distanță pentru a obține obiectivitate și claritate asupra planurilor tale pe termen lung. FELICITĂRI! ai aprofundat informațiile despre Cartea 19 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "27": {"intro": ["Cartea numărul 27, Mesajul, este mesagerul comunicării scrise și al informației documentate. Este cartea care aduce vești și notificări într-o formă tangibilă, oficială sau personală, dar consemnată."], "keywords": ["Mesaj (scris), Comunicare (scrisă), Corespondență, Notificare (scrisă)", "Document (oficial sau personal), Act, Înscris, Formular, Cerere, Aplicație", "Scrisoare (tradițională sau electronică - Email), Fax, Telegramă, SMS, Mesaj text", "Informație (documentată, oficială, specifică), Știri (scrise), Anunț (scris)", "Certificat, Diplomă, Licență, Permis, Atestat, Adeverință, Brevet", "Factură, Chitanță, Extras de cont, Notă de plată, Decont, Bon fiscal", "Contract (forma scrisă), Acord scris, Poliță de asigurare", "Scenariu, Manuscris, Text scris, Articol, Publicație", "Poștă, Curierat, Livrare de documente"], "general": ["Cartea 27, Mesajul, pune accentul pe comunicarea în formă scrisă și pe importanța documentelor. Spre deosebire de cartea Dezbaterile, care reprezintă conversația verbală și agitația, Mesajul aduce informații concrete, documentate, care pot fi citite, păstrate și analizate. Ea anunță primirea sau trimiterea unui mesaj scris, fie el personal (o scrisoare de dragoste, un email de la un prieten) sau oficial (o factură, un contract, o notificare). Reprezintă tot felul de acte și înscrisuri: certificate, diplome, licențe, permise, testamente, acte de proprietate etc. Este un semn că o informație importantă va fi consemnată sau că este necesară o dovadă scrisă. Conținutul Mesajului (pozitiv sau negativ) este rareori indicat de cartea însăși, ci mai degrabă de cărțile înconjurătoare. Energia sa este informativă, factuală, documentară și specifică."], "love": ["Schimb de mesaje scrise (scrisori, emailuri, SMS-uri lungi, postări online) cu semnificație emoțională. Declarații scrise.", "Poate indica documente oficiale care cimentează sau dizolvă o relație: certificat de căsătorie, acord prenupțial, acte de divorț (în funcție de context).", "Primirea unor știri scrise despre partener sau despre stadiul relației.", "Nevoia de a clarifica aspecte în scris sau de a păstra o dovadă a comunicării."], "career": ["Primirea sau semnarea unui contract de muncă, a unei oferte scrise, a unui acord de confidențialitate sau colaborare. Documentație de angajare.", "Corespondență oficială importantă: emailuri de afaceri, rapoarte scrise, memorii interne, note de serviciu, procese verbale.", "Obținerea unei diplome, a unui certificat de calificare, a unei licențe necesare profesiei. Validarea scrisă a competențelor.", "Facturi emise sau primite, comenzi scrise, documente de transport, corespondență comercială.", "Completarea și depunerea unor formulare, cereri, aplicații pentru joburi, granturi sau proiecte."], "health": ["Primirea rezultatelor analizelor medicale, a rapoartelor de investigații (RMN, CT etc.) în formă scrisă.", "Rețete medicale, bilete de trimitere, concedii medicale, adeverințe, scrisori medicale.", "Documente legate de asigurări de sănătate, dosare medicale, consimțăminte informate.", "Citirea unor articole, broșuri sau cărți cu informații relevante despre o afecțiune sau un stil de viață sănătos.", "Comunicarea scrisă cu medicii sau clinicile (emailuri, formulare online)."], "money": ["Primirea facturilor (utilități, telefon etc.), a chitanțelor, a extraselor de cont lunare. Notificări bancare scrise.", "Semnarea unor contracte financiare: de credit, de ipotecă, de leasing, de asigurare. Formulare și cereri specifice.", "Corespondență oficială legată de impozite și taxe, declarații fiscale, notificări de la ANAF.", "Primirea sau emiterea de cecuri, ordine de plată, facturi proforme. Documente de investiții, polițe.", "Orice informație financiară importantă care vine în formă scrisă."], "home": ["Corespondența obișnuită primită la domiciliu. Facturi, înștiințări, publicitate.", "Documente oficiale legate de locuință: acte de proprietate, contract de vânzare-cumpărare sau închiriere, autorizații de construcție.", "Comunicare scrisă ocazională între membrii familiei (felicitări, vederi, emailuri importante).", "Documente școlare ale copiilor: carnete de note, diplome, adeverințe, scrisori de la școală.", "Invitații scrise la evenimente familiale (nunți, botezuri etc.)."], "social": ["Schimb de scrisori, emailuri, mesaje mai lungi cu prietenii, în special cu cei aflați la distanță. Felicitări scrise.", "Primirea sau trimiterea de invitații scrise la evenimente sociale (petreceri, reuniuni).", "Comunicare scrisă în cadrul unor grupuri organizate (newsletter, minutele ședințelor, regulamente)."], "travel": ["Biletele tipărite sau electronice, voucherele de cazare, asigurările de călătorie, vizele, pașaportul.", "Confirmări scrise ale rezervărilor (email, SMS). Itinerare detaliate în scris.", "Trimiterea sau primirea de cărți poștale sau scrisori în timpul/după călătorie.", "Documente vamale sau alte formulare necesare la graniță sau la destinație."], "study": ["Diplomele, certificatele, atestatele – rezultatul documentat al studiilor.", "Susținerea examenelor scrise, redactarea de lucrări, eseuri, teze, proiecte scrise.", "Utilizarea intensivă a manualelor, cursurilor scrise, notițelor. Materiale de studiu în format fizic sau digital.", "Completarea formularelor de înscriere, a aplicațiilor pentru burse, a cererilor către secretariat.", "Primirea notelor și a evaluărilor în formă scrisă."], "spiritual": ["Studiul textelor sacre, al scripturilor, al cărților fundamentale ale unei tradiții spirituale.", "Scrierea ca practică spirituală: jurnal personal, notarea viselor, scrierea de afirmații sau rugăciuni.", "Posibilitatea de a primi mesaje sau ghidări în scris (semne în texte, scriere inspirată/automată).", "Documentarea parcursului spiritual, a studiilor sau a experiențelor.", "Certificate obținute în urma unor cursuri sau inițieri spirituale."], "time": ["Indică sosirea iminentă a unei știri, a unui mesaj sau a unui document. Evenimentul este apropiat.", "Timpul este adesea legat de procesul de corespondență: câteva zile până la o săptămână sau două, în funcție de metodă (poștă vs. email).", "Sugerează că informația va veni în curând și va fi documentată.", "Uneori asociată cu cifra 27."], "advice": ["al Cărții: Fii atent la detalii și la comunicarea scrisă! Mesajul te îndeamnă să citești cu atenție orice document, contract sau mesaj important. Este un moment bun să trimiți corespondența necesară sau să ceri confirmări scrise. Așteaptă-te la vești sau informații sub formă documentată și asigură-te că păstrezi actele importante în ordine. Claritatea și precizia în scris sunt esențiale acum. FELICITĂRI! ai aprofundat informațiile despre Cartea 27 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "22": {"intro": ["Cartea numărul 22, Alegerile, ne plasează în fața unui moment crucial de alegere. Este cartea opțiunilor multiple, a deciziilor care trebuie luate și a direcțiilor divergente pe care le poate lua viața."], "keywords": ["Alegere, Decizie (necesară, importantă), Opțiune, Hotărâre", "Alternative, Posibilități multiple, Variante, Căi diferite", "Răscruce de drumuri, Intersecție, Bifurcație, Punct de cotitură", "Direcție, Drum de urmat (de ales), Orientare (necesară)", "Liber arbitru, Responsabilitatea alegerii, Consecințe (ale deciziei)", "Oportunitate (de a alege, de a schimba direcția, de a explora)", "Ramificație, Diversificare, Extindere (în mai multe direcții), Paralelism (uneori)", "Incertitudine (privind alegerea), Indecizie, Ezitare, Deliberare", "Separare (de un drum vechi, alegând unul nou), Divergență", "Explorarea opțiunilor, Analiză comparativă"], "general": ["Cartea 22, Alegerile, apare atunci când ne aflăm la o intersecție majoră în viață. Semnificația sa centrală este necesitatea de a face o alegere dintr-o serie de opțiuni sau alternative disponibile. Nu mai este posibilă sau recomandată menținerea statusului; o decizie trebuie luată pentru a putea avansa. Această carte subliniază puterea liberului arbitru – capacitatea noastră de a ne alege calea – dar și responsabilitatea care vine odată cu această alegere, deoarece fiecare drum ales are propriile consecințe. Poate indica o perioadă de explorare a posibilităților, de cântărire a alternativelor, dar și riscul de a rămâne blocat în indecizie sau incertitudine. Alegerile pot sugera și diversificarea (urmarea mai multor căi simultan, dacă este posibil) sau o separare necesară de o direcție veche pentru a îmbrățișa una nouă. Energia sa este una a potențialului multiplu, dar care cere claritate și angajament într-o direcție anume."], "love": ["Un moment de decizie crucială în relație: angajament vs. despărțire, continuarea împreună vs. drumuri separate, alegerea între doi potențiali parteneri.", "Existența unor opțiuni multiple în viața sentimentală. Nevoia de a alege pe cineva sau un anumit tip de relație.", "Posibila divergență a drumurilor în cuplu (interese diferite, planuri de viitor care nu se aliniază).", "Explorarea unor căi alternative de a rezolva problemele relaționale sau de a trăi viața de cuplu.", "Perioadă de incertitudine și ezitare în a lua o hotărâre legată de dragoste."], "career": ["Alegerea între mai multe oferte de muncă, oportunități de proiecte sau chiar direcții de carieră diferite. Un punct de cotitură profesional.", "Necesitatea stringentă de a lua o decizie strategică legată de viitorul profesional sau de o afacere.", "Prezența unor alternative multiple pentru dezvoltare, promovare sau schimbare.", "Posibilitatea de a diversifica activitatea profesională, de a avea mai multe joburi/proiecte în paralel sau de a explora o nouă specializare.", "Indecizie cu privire la cea mai bună cale de urmat în carieră."], "health": ["Nevoia de a alege între diferite opțiuni de tratament, medici, terapeuți sau abordări terapeutice (convenționale vs. alternative).", "Explorarea diverselor căi pentru îmbunătățirea sănătății și a stilului de viață.", "Decizii importante legate de regimul alimentar, programul de exerciții sau renunțarea la obiceiuri, care pot avea multiple variante.", "Incertitudine cu privire la cea mai eficientă metodă de vindecare sau de menținere a sănătății."], "money": ["Decizii importante de luat cu privire la investiții, economii, credite sau strategii financiare pe termen lung. Analiza opțiunilor.", "Existența mai multor căi de a gestiona banii sau de a obține venituri. Nevoia de a alege una.", "Posibilitatea de a diversifica sursele de venit sau portofoliul de investiții.", "Ezitare sau incertitudine în fața unor alegeri financiare importante. Necesită analiză atentă a riscurilor și beneficiilor fiecărei opțiuni."], "home": ["Alegeri legate de locuință: cumpărare vs. închiriere, alegerea între mai multe proprietăți, decizii privind renovarea sau decorarea.", "Existența unor opțiuni multiple privind aranjamentele de viață ale familiei sau modul de organizare domestică.", "Situații în care membrii familiei trebuie să ia decizii care îi pot duce pe drumuri diferite.", "Necesitatea de a discuta și a alege împreună o direcție comună în chestiuni familiale importante."], "social": ["Alegerea între diferite grupuri de prieteni, activități sociale sau angajamente.", "Drumurile divergente ale prietenilor; unii aleg o cale, alții alta, ducând la o posibilă reconfigurare a cercului social.", "Decizii legate de timpul și energia investite în anumite prietenii sau activități sociale.", "Explorarea unor noi cercuri sociale, diversificarea vieții sociale."], "travel": ["Alegerea destinației, a itinerariului sau a modului de transport din mai multe posibilități.", "O răscruce de drumuri literală sau metaforică în timpul călătoriei, care impune o decizie de continuare.", "Călătorii care includ mai multe destinații sau opțiuni de explorare.", "Incertitudine legată de planurile de călătorie, necesitatea de a alege o variantă finală."], "study": ["Momentul alegerii unei facultăți, specializări, a unui masterat sau a cursurilor opționale din mai multe alternative.", "Explorarea diferitelor discipline sau domenii de interes înainte de a se decide asupra uneia.", "Decizii importante care vor contura viitorul parcurs educațional.", "Posibilitatea de a studia în paralel mai multe subiecte sau de a urma cursuri diverse."], "spiritual": ["Alegerea conștientă a unei căi spirituale, a unei filozofii de viață sau a unei practici din multitudinea de opțiuni existente.", "Explorarea diverselor tradiții spirituale pentru a găsi ceea ce rezonează personal. Un moment de răscruce în evoluția spirituală.", "Conștientizarea profundă a liberului arbitru și a impactului fiecărei alegeri spirituale.", "Posibilă incertitudine sau ezitare în angajamentul față de o anumită cale, nevoia de a explora mai mult înainte de a decide."], "time": ["Indică un moment de decizie care este actual sau foarte apropiat. Necesitatea de a alege este prezentă acum.", "Durata se referă mai mult la perioada de deliberare sau la momentul alegerii în sine. Consecințele se vor vedea ulterior.", "Sugerează adesea un interval de câteva săptămâni (2) sau luni (2) în care decizia trebuie luată sau în care se explorează opțiunile.", "Asociată cu cifra 22 și cu dualitatea/multiplicitatea."], "advice": ["al Cărții: Este timpul să alegi! Drumurile îți arată că ai ajuns la o intersecție și că ai la dispoziție mai multe opțiuni. Analizează cu atenție alternativele, cântărește argumentele pro și contra, ascultă-ți intuiția, dar nu rămâne blocat în indecizie. Asumă-ți responsabilitatea pentru alegerea ta și pornește cu încredere pe drumul selectat, conștient că fiecare alegere deschide un nou set de posibilități. FELICITĂRI! ai aprofundat informațiile despre Cartea 22 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "21": {"intro": ["Cartea numărul 21, Obstacolele, este simbolul blocajelor, întârzierilor semnificative și al provocărilor care necesită efort considerabil pentru a fi depășite. Reprezintă tot ceea ce stă în calea progresului."], "keywords": ["Obstacol (major, solid), Blocaj, Barieră (înaltă, dificilă), Impediment", "Întârziere (semnific împotmolită, fără viitor, dar și fără o finalizare clară (stagnare).", "Întârzieri majore în planurile comune (căsătorie, copii, mutatul împreună).", "Poate indica separare cauzată de circumstanțe externe sau de blocaje interioare profunde."], "career": ["Blocaje majore în avansarea în carieră sau în realizarea obiectivelor profesionale. Proiecte importante oprite sau întârziate pe termen lung.", "Sentimentul de a fi \"blocat\" într-un job fără perspective, imposibilitatea de a găsi altceva sau de a progresa.", "Opoziție puternică din partea șefilor, a sistemului sau a competitorilor. Un \"inamic\" la locul de muncă.", "Birocrație excesivă care blochează orice inițiativă. Rezistență la schimbare.", "Necesită perseverență îndelungată sau o reorientare strategică majoră pentru a depăși impasul."], "health": ["Un obstacol serios în calea vindecării. Recuperarea este foarte lentă, blocată sau întâmpină dificultăți majore.", "Blocaje fizice (ex: pietre la rinichi/vezică, blocaje arteriale, constipație cronică - nu este diagnostic medical!) sau energetice persistente.", "Sentimentul de a fi prins într-o afecțiune cronică sau greu de tratat. Frustrare legată de starea de sănătate.", "Imobilitate prelungită, dificultăți majore de mișcare.", "Poate indica afecțiuni legate de oase, articulații rigide sau probleme asociate cu frigul/altitudinea."], "money": ["Blocaje financiare severe, incapacitatea de a accesa fonduri, credite respinse, datorii mari care blochează progresul.", "Întârzieri foarte mari în încasarea unor sume de bani importante.", "Sentimentul de a fi \"prins\" într-o situație financiară dificilă, fără soluții imediate.", "Rezistență puternică în negocieri financiare, dificultatea de a obține finanțare sau de a rezolva problemele monetare.", "Necesită răbdare și posibil strategii financiare complet noi pentru a depăși blocajul."], "home": ["Obstacole majore legate de locuință (imposibilitatea de a vinde/cumpăra/construi, probleme structurale grave).", "Blocaje d  legat de primirea a ceva plăcut: un cadou material sau simbolic, o invitație la un eveniment social sau o întâlnire, o formă de apreciere sau recunoaștere pentru eforturile depuse. Este cartea surprizelor plăcute, a momentelor care ne aduc zâmbetul pe buze și ne umplu inima de satisfacție. Surpriza reprezintă frumusețea în toate formele ei – estetica, arta, natura înfloritoare, dar și farmecul personal și grația în interacțiuni. Pune accent pe importanța politeții, a bunelor maniere și a gesturilor amabile. Adesea, anunță evenimente sociale fericite (petreceri, nunți, aniversări) sau succes în domenii legate de creativitate și artă. Poate reprezenta și o persoană agreabilă, de obicei o femeie matură, independentă și plină de farmec (Regina de Pică). Energia sa este luminoasă, caldă, primitoare și înălțătoare."], "love": ["Primirea unui cadou semnificativ, a florilor sau a unui gest romantic ce exprimă afecțiune și apreciere.", "O invitație specială la o întâlnire, o escapadă romantică sau un eveniment elegant în doi.", "Perioadă de armonie deplină, bucurie împărtășită, apreciere și admirație reciprocă în cuplu. Farmecul personal este accentuat.", "Relația înflorește, se dezvoltă frumos, aducând multă fericire.", "Poate prevesti o logodnă sau o cerere în căsătorie (mai ales lângă Inel) sau pur și simplu o declarație de dragoste sinceră."], "career": ["Recunoașterea publică a meritelor, laude, aprecieri oficiale, feedback pozitiv.", "Primirea unui bonus neașteptat, a unui premiu, a unui cadou din partea companiei sau a unui client mulțumit.", "O invitație la un eveniment important de networking, o conferință plăcută sau o petrecere corporate reușită. Succes la interviuri sau prezentări.", "Succes și satisfacție în domenii creative, artistice, relații publice, organizare de evenimente, industria frumuseții.", "Un mediu de lucru armonios, colegi amabili, atmosferă generală pozitivă și motivantă."], "health": ["Recuperare rapidă și plăcută, revenirea la o stare de bine. Vești bune de la medic.", "Sentiment general de bunăstare, optimism, vitalitate. Bucuria de a fi sănătos.", "Beneficiile terapiilor alternative care implică frumosul și simțurile: aromaterapie, terapie prin artă, meloterapie, remedii florale Bach.", "Poate indica o vizită la un salon de înfrumusețare sau o zi de spa ca parte a procesului de bunăstare."], "money": ["Primirea unui cadou substanțial în bani sau a unui bonus consistent. O surpriză financiară foarte plăcută.", "O perioadă de prosperitate și satisfacție financiară, posibilitatea de a cheltui pe lucruri care aduc bucurie.", "Succes în afaceri legate de artă, frumusețe, cadouri, evenimente.", "O investiție care aduce profit și satisfacție."], "home": ["Atmosferă de sărbătoare în casă, primirea cu bucurie a oaspeților. Evenimente fericite în familie (aniversări, logodne etc.).", "Primirea sau oferirea de cadouri semnificative în cadrul familiei. Gesturi de apreciere și iubire.", "Un cămin frumos, primitor, decorat cu gust, unde domnește armonia.", "Relații excelente cu membrii familiei, bucuria de a petrece timp împreună."], "social": ["Numeroase invitații la petreceri, evenimente culturale, ieșiri cu prietenii. O viață socială bogată și plăcută.", "Popularitate, farmec personal apreciat de cei din jur. Abilitatea de a lega ușor noi prietenii.", "Primirea de cadouri, complimente și semne de apreciere din partea prietenilor.", "Atmosferă de veselie și bună înțelegere în cercul social."], "travel": ["O invitație atractivă la o călătorie sau o vacanță, posibil primită cadou.", "O călătorie extrem de plăcută, relaxantă și plină de experiențe frumoase.", "Vizitarea unor destinații renumite pentru frumusețea lor naturală sau artistică.", "Călătorii în scop social sau pentru a participa la evenimente festive."], "study": ["Succes remarcabil în examene sau proiecte, în special în domenii artistice sau umaniste. Primirea de premii sau diplome.", "Recunoașterea talentului și a eforturilor de către profesori sau coleg
