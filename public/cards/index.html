ces"]}, "15": {"intro": ["Cartea numărul 15, Puterea, este un simbol impunător al forței, autorității și al resurselor, în special financiare. Este o carte a conducerii, protecției și stabilității materiale."], "keywords": ["Putere (personală, financiară, fizică, de influență), Forță, Tărie", "Autoritate, Leadership, Conducere, Șef, Patron, Manager, Oficial", "Protecție, Apărare (a teritoriului, a resurselor, a celor dragi), Pază", "Finanțe, Bani (adesea sume mari), Resurse materiale, Avere, Bogăție, Investiții, Capital", "Stabilitate financiară, Prosperitate (construită), Management financiar", "Figurǎ maternǎ puternicǎ (mamă, bunică, soacră, matriarhă, femeie de afaceri influentă)", "Dietă, Nutriție, Alimentație, Probleme de greutate, Metabolism", "Forță fizică, Vigoare, Rezistență, Musculatură", "Posesivitate, Gelozie (teritorială), Dominanță, Control excesiv (aspect negativ)", "Curaj, Stăpânire de sine, Demnitate"], "general": ["Cartea 15, Puterea, emană autoritate. Este un indicator major al forței, fie ea fizică, personală sau, cel mai adesea, financiară. Puterea guvernează lumea banilor, a investițiilor, a resurselor materiale și a stabilității financiare construite prin muncă și management înțelept. Reprezintă figuri de autoritate: șefi, lideri, manageri, persoane influente sau oficialități. De asemenea, este un simbol puternic al protecției – Puterea își apără teritoriul, resursele și puii cu ferocitate. Poate indica nevoia de a proteja ceea ce este valoros sau prezența unei figuri protectoare în viața consultantului, adesea o figură maternă puternică (mama, bunica, soacra). Pe plan personal, vorbește despre puterea interioară, curaj și stăpânire de sine. O altă latură importantă este legătura cu corpul fizic, în special dieta, nutriția și greutatea. Aspectul său negativ se manifestă prin posesivitate excesivă, gelozie teritorială, lăcomie sau tendința de a domina și controla prin putere. Energia sa este masivă, stabilă, protectoare, dar poate deveni greoaie sau intimidantă dacă nu este echilibrată."], "love": ["Un partener puternic, stabil financiar, protector, care oferă siguranță. Poate fi o figură dominantă în relație.", "Influența semnificativă a unei figuri materne (mama, soacra) asupra cuplului, în bine sau în rău.", "Atenție la tendințele de posesivitate, gelozie sau control excesiv din partea unuia dintre parteneri. Dinamici de putere.", "Stabilitatea financiară este un factor important în relație. Construirea unui viitor material împreună.", "Unul dintre parteneri poate avea o poziție de conducere sau o personalitate foarte puternică."], "career": ["Reprezintă direct șeful, managerul, directorul general sau orice persoană cu autoritate decizională. Relația cu superiorii.", "Indică putere personală și influență la locul de muncă. Potențial de leadership și avansare în poziții de conducere.", "Stabilitate profesională, o carieră solidă, o companie puternică financiar. Forța de a gestiona responsabilități mari.", "Aspecte financiare esențiale ale muncii: salariu mare, bonusuri, investiții legate de afacere, managementul bugetelor.", "Domenii predilecte: finanțe-bănci, management, administrație publică, industria alimentară/nutriție, poziții de conducere în orice domeniu. Atenție la luptele pentru putere și la șefii dominatori."], "health": ["Focalizare pe dietă, nutriție, alimentație și managementul greutății. Poate indica necesitatea de a schimba regimul alimentar sau probleme legate de greutate.", "Reprezintă forța fizică, vitalitatea, rezistența organismului. O constituție puternică.", "Procesul de vindecare poate necesita întărirea organismului prin nutriție adecvată și odihnă.", "Poate fi legat simbolic de sistemul digestiv superior sau de masa musculară."], "money": ["Una dintre cărțile principale ale finanțelor. Indică putere financiară, avere, resurse considerabile, investiții pe termen lung, active valoroase.", "Reprezintă bănci, fonduri de investiții, managementul averii, conturi bancare solide.", "Sugerează stabilitate financiară, venituri mari, capacitatea de a gestiona sume importante de bani.", "Nevoia de a administra cu putere și înțelepciune resursele și de a proteja investițiile.", "Poate indica un mentor financiar sau o persoană influentă care oferă sprijin material."], "home": ["Figura matriarhală (mama, bunica) dominantă sau foarte influentă în familie. O figură protectoare centrală.", "Finanțele familiei, bugetul comun, resursele materiale ale gospodăriei. Stabilitatea materială a căminului.", "Nevoia de a proteja casa și familia. Asigurarea securității celor dragi.", "Posibile lupte pentru putere sau dinamici de control în cadrul familiei."], "social": ["Prezența unui prieten influent, puternic, posibil bogat sau cu o poziție importantă, care oferă protecție sau ajutor.", "Atenție la prietenii care pot deveni posesivi, geloși sau încearcă să domine grupul.", "Statutul social conferit de putere, influență sau avere.", "Protejarea cercului de prieteni sau a reputației sociale."], "travel": ["Călătorii în scop de afaceri, pentru întâlniri cu persoane importante sau legate de investiții/finanțe.", "Călătorii pentru a vizita mama, bunica sau o altă figură maternă importantă.", "Deplasări în locuri care simbolizează puterea naturii (munți înalți, păduri vaste).", "Necesită resurse financiare sau forță (fizică/interioară) pentru a fi întreprinse."], "study": ["Studierea aprofundată a finanțelor, economiei, managementului, afacerilor, nutriției sau a domeniilor legate de putere și autoritate.", "Relația cu un profesor sau mentor influent, puternic, care poate oferi sprijin important.", "Necesită perseverență, forță și posibil resurse financiare considerabile pentru a finaliza un program de studiu.", "Dezvoltarea încrederii în sine și a autorității personale prin cunoaștere."], "spiritual": ["Cultivarea puterii interioare, a forței spirituale și a autenticității. Asumarea propriei autorități spirituale.", "Conectarea cu energia Pământului, cu arhetipul Mamei Pământ sau cu spiritele animalelor de putere (Ursul). Împământare.", "Practici care dezvoltă rezistența și stăpânirea de sine pe calea spirituală.", "Folosirea înțeleaptă a influenței și a puterii spirituale, evitând egoul sau tendința de a domina. Protecție energetică."], "time": ["Indică o perioadă de stabilitate sau o dezvoltare pe termen mai lung. Puterea și resursele se acumulează în timp.", "Poate sugera cicluri financiare sau perioade care durează între 6 luni și 1 an, sau chiar mai mult, legate de investiții sau poziții de putere.", "Este o carte a permanenței relative, nu a schimbărilor rapide. Asociată uneori cu cifra 15."], "advice": ["al Cărții: Asumă-ți puterea și gestionează-ți resursele cu înțelepciune! Ursul te îndeamnă să fii conștient de forța ta (interioară, financiară, fizică), să o folosești constructiv pentru a te proteja pe tine și pe cei dragi și pentru a construi stabilitate. Administrează-ți banii și bunurile cu responsabilitate și curaj. Respectă autoritatea, dar nu te lăsa intimidat. Fii atent la echilibrul dintre putere și control, evitând posesivitatea și dominanța. FELICITĂRI! ai aprofundat informațiile despre Cartea 15 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "5": {"intro": ["Cartea cu numărul 5, VITALITATEA, este un simbol puternic al vieții, sănătății, creșterii naturale și al stabilității profunde. Reprezintă forța vitală, conexiunea cu rădăcinile și anduranța în fața timpului."], "keywords": ["Sănătate, Stare de bine (fizică, mentală, spirituală), Vitalitate, Energie vitală", "Creștere (lentă, organică, naturală), Dezvoltare durabilă, Maturizare", "Stabilitate (profundă), Anduranță, Rezistență, Forță, Soliditate", "Rădăcini, Origini, Strămoși, Genealogie, Karma (uneori), Trecut, Istoric", "Răbdare, Timp îndelungat, Durată, Proces lent", "Natură, Aer liber, Pădure, Lemn, Resurse naturale", "Împământare, Conectare cu Pământul, Echilibru", "Medicină, Vindecare (proces lent), Terapii naturiste", "Plictiseală, Stagnare, Rutină (ca aspect negativ, rar)"], "general": ["Cartea 5, Vitalitatea, este considerată cartea principală a sănătății în sistemul Lenormand. Ea reflectă starea noastră generală de vitalitate și bunăstare. Pe lângă sănătate, Vitalitatea simbolizează creșterea lentă, organică și durabilă – procesele care necesită timp și răbdare pentru a ajunge la maturitate, dar care oferă stabilitate și rezistență. Este profund conectat la rădăcinile noastre, fie ele familiale (strămoși, origini), fie cele ale unei situații sau probleme (cauzele adânci). Reprezintă anduranța, capacitatea de a trece peste dificultăți pe termen lung și forța interioară. Energia Vitalității este calmă, stabilă, împământată și orientată spre durată. Aduce o legătură puternică cu natura și cu ritmurile ei. Poate indica uneori și o tendință spre rutină sau plictiseală, dacă stabilitatea devine rigiditate. În esență, ne cere să avem grijă de sănătatea noastră, să cultivăm răbdarea și să ne onorăm rădăcinile."], "love": ["O relație stabilă, matură, de lungă durată, cu rădăcini adânci și un fundament solid.", "Creștere lentă, dar constantă a legăturii, dezvoltare organică a sentimentelor și a angajamentului. Necesită răbdare.", "Poate indica o conexiune karmică sau o relație influențată puternic de trecut sau de modele familiale.", "O relație sănătoasă, echilibrată, unde partenerii cresc împreună.", "Poate semnala o perioadă de stabilitate, uneori chiar rutină, în viața de cuplu."], "career": ["O carieră solidă, un loc de muncă stabil și de lungă durată, posibil într-o instituție consacrată.", "Creștere profesională lentă, dar sigură, bazată pe muncă susținută și acumulare de experiență.", "Domenii profesionale legate de sănătate (medici, terapeuți, farmaciști), natură (silvicultură, agronomie, ecologie, cercetare de mediu), istorie, genealogie, prelucrarea lemnului, construcții durabile.", "Proiecte pe termen lung, care necesită planificare atentă, răbdare și anduranță.", "Construirea unei fundații profesionale puternice și respectate."], "health": ["Indicatorul principal al stării de sănătate. Lângă cărți pozitive, indică vitalitate, forță, sănătate bună.", "Un proces de vindecare care necesită timp, o recuperare lentă, dar progresivă.", "Lângă cărți negative (Norii, Coșciugul, Șarpele), poate indica probleme de sănătate cronice, cu rădăcini adânci sau chiar aspecte karmice legate de sănătate.", "Sugerează beneficiile terapiilor naturiste, odihnei, relaxării în natură, alimentației sănătoase și a unui stil de viață echilibrat pe termen lung.", "Reprezintă forța vitală, rezistența organismului."], "money": ["Stabilitate financiară construită în timp. Creștere lentă, dar constantă a veniturilor sau a economiilor.", "Investiții pe termen lung (imobiliare, fonduri de pensii, acțiuni deținute pe durată mare).", "Finanțe legate de afaceri de familie sau domenii precum sănătatea, agricultura, resursele naturale.", "Necesită răbdare pentru a vedea rezultatele financiare. O bază financiară solidă."], "home": ["Legătură puternică cu familia de origine, cu strămoșii, rădăcinile și istoria familială. Interes pentru genealogie.", "Un cămin stabil, de lungă durată, posibil o casă cu grădină sau situată în apropierea naturii.", "Sănătatea și bunăstarea membrilor familiei sunt importante.", "Tradiții familiale respectate și transmise mai departe."], "social": ["Prietenii vechi, solide, de lungă durată, pe care te poți baza. Legături profunde.", "Apartenența la un grup stabil, bazat pe încredere și istoric comun.", "Relații sociale sănătoase, echilibrate, deși poate nu foarte dinamice."], "travel": ["De obicei, indică statornicie, nu călătorii frecvente.", "Dacă apar călătorii, sunt adesea legate de natură (munți, păduri, zone rurale), de vizitarea locurilor natale sau a rudelor, sau de motive medicale (tratamente, spa-uri)."], "study": ["Un proces de învățare aprofundat, pe termen lung. Necesită răbdare, studiu constant și perseverență.", "Potrivit pentru studii universitare lungi, masterate, doctorate sau specializări care cer timp.", "Domenii predilecte: științele vieții (biologie, medicină), științele naturii (ecologie, botanică), istoria, genealogia, domenii ce necesită cercetare de durată.", "Construirea unei baze solide de cunoștințe."], "spiritual": ["Conexiunea profundă cu Pământul și natura ca sursă de înțelepciune și vindecare. Practici de împământare.", "Explorarea rădăcinilor spirituale, a karmei, a moștenirii ancestrale.", "Creștere spirituală lentă, organică, ca un copac ce se înalță treptat spre cer. Răbdare pe cale.", "Practici legate de vindecare (energetică, herbalism), meditație în natură, lucrul cu energia pământului."], "time": ["Indică o perioadă de timp îndelungată. Procesele se desfășoară lent.", "Necesită răbdare – poate fi vorba de luni de zile sau chiar ani.", "Se referă la ceva stabil, de durată, existent de mult timp.", "Poate indica o perioadă de așteptare necesară pentru creștere sau vindecare. Uneori asociată cu cifra 5."], "advice": ["al Cărții: Ai răbdare și încredere în procesele pe termen lung! Cartea 5 te sfătuiește să îți cultivi sănătatea și vitalitatea, să te împământezi și să te conectezi cu rădăcinile tale. Construiește pe fundații solide, fii andurant și acceptă că adevărata creștere necesită timp. Prețuiește stabilitatea și forța care vin din dezvoltarea organică și naturală. FELICITĂRI! ai aprofundat informațiile despre Cartea 5, acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "3": {"intro": ["Cartea cu numărul 3 - Dinamismul - ne poartă într-o călătorie dincolo de orizontul imediat. Este cartea distanței, a tranziției și a explorării, fie ea fizică sau metaforică."], "keywords": ["Călătorie (în special pe distanțe lungi, peste apă, în străinătate)", "Tranziție, Schimbare de loc sau stare, Mutare", "Distanță (fizică sau emoțională), Depărtare", "Comerț, Afaceri (internaționale), Import/Export, Tranzacții la distanță", "Explorare, Aventură, Orizonturi noi, Descoperire", "Nostalgie, Dor (de ducă sau de cineva/ceva aflat departe)", "Plecare, Despărțire (uneori, indicând mișcare spre altceva)", "Vehicule mari (navă, avion, camion, tren pe distanțe lungi - simbolic)", "Proces lent, Mișcare constantă (dar nu la fel de rapidă ca la Cartea 1), Durată", "Expansiune, Dezvoltare (adesea prin comerț sau călătorie)"], "general": ["Cartea 3, Dinamismul, semnalează în primul rând călătorii pe distanțe mari și tranziții semnificative. Spre deosebire de mișcarea rapidă a Cărții 1, Dinamismul implică un proces, o mișcare ce necesită timp și planificare, ducând adesea spre orizonturi noi și necunoscute. Poate reprezenta o călătorie fizică (vacanță în străinătate, delegație, emigrare) sau o călătorie interioară, o perioadă de schimbare profundă în viață sau mentalitate. Este puternic legată de distanță, indicând separarea fizică sau emoțională de locuri, persoane sau situații. Adesea, aduce în discuție teme legate de comerț, afaceri internaționale sau orice activitate care implică tranzacții la distanță. Poate evoca și sentimente de nostalgie sau dor de ceea ce este departe. Energia sa este una de explorare și expansiune, dar necesită răbdare și adaptare la fluxul evenimentelor."], "love": ["O relație la distanță sau potențialul uneia. Comunicare menținută de la depărtare.", "Unul dintre parteneri călătorește frecvent sau urmează să plece pentru o perioadă mai lungă.", "Poate indica o distanțare emoțională, o perioadă de răcire sau nevoia de spațiu personal. Poate semnala și o tranziție majoră a relației (ex: mutatul împreună, căsătoria după o perioadă la distanță, sau chiar o despărțire amiabilă cu plecarea unuia dintre parteneri).", "Evocă dorul și nostalgia față de partenerul aflat departe."], "career": ["Călătorii frecvente de afaceri, delegații internaționale.", "Oportunități semnificative în comerț internațional, import/export, logistică sau domenii ce implică lucrul cu parteneri străini.", "Posibilitatea unei relocări profesionale, mutarea în alt oraș sau țară pentru un job.", "O tranziție majoră în carieră, o schimbare de direcție sau începutul unei afaceri cu perspectivă internațională.", "Proiecte pe termen lung care implică deplasări, planificare extinsă și coordonare la distanță."], "health": ["Necesitatea sau oportunitatea de a căuta un tratament, o a doua opinie sau un specialist la distanță, posibil în altă țară.", "Un proces de vindecare lent, dar constant, o tranziție graduală spre o stare de sănătate mai bună. Necesită răbdare.", "Uneori poate fi legată simbolic de afecțiuni ale vezicii biliare, ficatului sau de probleme legate de lichide/circulație. Poate indica și rău de mișcare.", "Sugerează că o schimbare majoră (de mediu, stil de viață) poate fi benefică pentru sănătate."], "money": ["Oportunități financiare venite din străinătate (job, investiții, moștenire). Afaceri și tranzacții internaționale.", "Bani care sosesc de la distanță (transferuri internaționale) sau care sunt investiți în afara țării. Poate indica o așteptare până la primirea banilor.", "O tranziție financiară importantă, o schimbare în strategia de investiții sau planificare pe termen lung.", "Potențial de câștig prin comerț sau afaceri care implică transport și distanță"], "home": ["Planuri concrete sau realizarea unei mutări la distanță, schimbarea domiciliului în alt oraș sau țară.", "Prezența unor membri ai familiei care locuiesc departe sau care călătoresc frecvent. Comunicare la distanță cu familia.", "Tranziții majore în dinamica familială (copii care pleacă de acasă, reîntregiri de familie după perioade de separare).", "Sentimente de dor de casă (dacă ești plecat) sau de cei dragi aflați departe."], "social": ["Menținerea legăturilor cu prieteni aflați la distanță geografică.", "Planificarea sau realizarea unor călătorii împreună cu prietenii.", "Posibila distanțare de vechiul cerc social datorită unei mutări sau a unor noi interese legate de călătorii/străinătate.", "Explorarea unor noi grupuri sociale, posibil internaționale sau online."], "travel": ["Indicația principală pentru călătorii, în special cele lungi, internaționale, peste mări.", "Reprezintă planificarea, plecarea sau sosirea dintr-o călătorie importantă.", "Simbolizează mijloacele de transport pentru distanțe lungi (navă, avion, tren etc.).", "Subliniază dorința de explorare, aventură, lărgirea orizonturilor și ieșirea din rutina zilnică."], "study": ["Oportunitatea concretă de a studia în străinătate (bursă, program de schimb, master etc.).", "Urmarea unor cursuri la distanță sau online cu instituții din alte țări.", "Cercetare aprofundată care poate necesita deplasări sau explorarea unor surse internaționale.", "O tranziție spre o nouă etapă educațională majoră, adesea implicând o locație nouă.", "Învățarea unei limbi străine sau aprofundarea unor culturi diferite."], "spiritual": ["Începerea sau continuarea unei călătorii spirituale semnificative, o căutare de sens pe termen lung. Poate include pelerinaje sau retrageri în locuri îndepărtate.", "Explorarea și integrarea înțelepciunii din diverse culturi, religii sau tradiții spirituale. Depășirea granițelor spirituale personale.", "Un proces de tranziție spirituală lentă și profundă, o evoluție constantă.", "Conștientizarea propriei călătorii prin viață, cu scopul de a învăța și explora."], "time": ["Indică o perioadă de timp mai lungă decât primele două cărți. Evenimentele sau tranzițiile se desfășoară în timp.", "Necesită răbdare. Vorbim despre săptămâni, luni sau chiar o perioadă nedefinită, dar care implică un proces (ex: \"până ajunge nava\").", "Uneori poate fi asociată cu cifra 3 (3 săptămâni, 3 luni etc.)."], "advice": ["al Cărții: Fii deschis la călătorie, tranziție și explorare! Dinamismul te îndeamnă să privești dincolo de orizontul familiar și să îmbrățișezi schimbarea, chiar dacă implică distanță sau necesită timp. Ai răbdare cu procesele în desfășurare, planifică-ți \"călătoriile\" (fie ele fizice sau metaforice) și fii pregătit să te adaptezi la noi medii sau perspective. Este timpul pentru expansiune și descoperire! FELICITĂRI! ai aprofundat informațiile despre Cartea 3, acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "18": {"intro": ["Cartea numărul 18, Loialitatea, este simbolul universal al prieteniei adevărate, încrederii și devotamentului. Este una dintre cele mai pozitive cărți din pachet, reprezentând relațiile solide și sprijinul necondiționat."], "keywords": ["Loialitate, Fidelitate, Credință (față de cineva), Devotament", "Prietenie (adevărată, apropiată, de încredere, de lungă durată), Camaraderie", "Încredere, Onestitate (în relații)", "Companie, Tovărășie, Anturaj plăcut și sigur", "Sprijin, Ajutor (dezinteresat), Susținere, Asistență", "Protecție (prietenoasă), Apărare (a celor dragi), Pază (simbolică)", "Fiabilitate, Constanță, Statornicie (în relații), Predictibilitate pozitivă", "Dependență (în sensul bun, de a putea conta pe cineva)", "Serviciu, Ajutorare, Bunăvoință, Amabilitate constantă", "Cunoștință apropiată, Aliat de încredere, Confident", "Animal de companie (în special câinele, literal), Loialitate animală"], "general": ["Cartea 18, Loialitatea, este arhetipul prietenului loial și al companionului de nădejde. Semnificația sa centrală este fidelitatea neclintită, încrederea profundă și devotamentul sincer. Apariția acestei cărți indică prezența (sau nevoia) unor relații solide, de lungă durată, fie că este vorba de prietenie, parteneriat de viață sau colaborare profesională. Reprezintă sprijinul pe care te poți baza, ajutorul oferit fără rezerve și protecția venită din afecțiune și loialitate. Este o carte a constanței și a fiabilității – persoanele sau situațiile descrise de Câine sunt de obicei stabile și predictibile în sens pozitiv. Poate reprezenta o persoană specifică – un prieten foarte bun, un partener devotat, un coleg de încredere – sau, în mod literal, un animal de companie iubit. Energia sa este caldă, prietenoasă, protectoare și profund loială. Este un memento al valorii inestimabile a încrederii și a legăturilor autentice."], "love": ["Nivel înalt de loialitate, fidelitate și devotament în cuplu. Încredere totală în partener.", "Relația este consolidată de o prietenie profundă și o companie plăcută. Partenerul este și cel mai bun prieten.", "Sprijin emoțional constant și necondiționat din partea partenerului. Fiabilitate.", "Indică adesea o relație de lungă durată, stabilă, confortabilă și sigură.", "Partenerul este văzut ca un companion loial pentru viață."], "career": ["Colegi sau parteneri de afaceri extrem de loiali și de încredere. Mediu de lucru bazat pe sprijin reciproc.", "Un angajat devotat și fiabil sau un șef/mentor suportiv și protector.", "Angajament pe termen lung față de o companie, un proiect sau o echipă. Stabilitate profesională.", "Relații profesionale bazate pe încredere și respect mutual. Networking eficient prin contacte loiale.", "Poate indica profesii dedicate serviciilor către ceilalți, îngrijirii, pazei și protecției sau lucrului cu animalele."], "health": ["Beneficiile sprijinului emoțional din partea celor dragi (prieteni, familie, partener, animale) în procesul de vindecare. Compania alină suferința.", "Perseverența și loialitatea față de un regim de viață sănătos sau un plan de tratament pe termen lung.", "Rolul pozitiv al animalelor de companie asupra sănătății mentale și fizice (reducerea stresului, încurajarea mișcării).", "Poate indica necesitatea unui control medical de rutină (așa cum duci câinele la veterinar) sau probleme de sănătate ale animalului de companie."], "money": ["Parteneri financiari de încredere, consultanți loiali, sfaturi financiare oneste.", "Sprijin financiar posibil din partea prietenilor sau a unor persoane devotate.", "Tranzacții sigure, colaborări financiare stabile și predictibile.", "Stabilitate financiară obținută prin muncă constantă și relații de încredere.", "Cheltuie function combo(key,desc){
  var p=key.split("+");
  return "<div class=\"cc\"><div class=\"ch\"><span class=\"cn\">"+p[0]+" + "+p[1]+"</span><span class=\"cnames\">"+e(gn(p[0]))+" + "+e(gn(p[1]))+"</span></div><div class=\"cd\">"+e(desc)+"</div></div>";
}
var pc=0;
function panel(n){
  var info=K[String(n)];if(!info)return"";
  var id="p"+(pc++);
  var kwH="";
  if(info.keywords&&info.keywords.length){
    kwH="<div class=\"kw\"><div class=\"kwl\">Cuvinte Cheie</div><div class=\"kwp\">";
    for(var i=0;i<info.keywords.length;i++)kwH+="<span class=\"kwi\">"+e(info.keywords[i])+"</span>";
    kwH+="</div></div>";
  }
  var gmH="";
  if(info.general&&info.general.length){
    gmH="<div class=\"gm\"><div class=\"gml\">\u2728 Semnifica\u021Bie General\u0103</div><div class=\"gmt\">";
    for(var i=0;i<info.general.length;i++)gmH+="<p style=\"margin-bottom:8px\">"+e(info.general[i])+"</p>";
    gmH+="</div></div>";
  }
  var dOrder=["love","career","health","money","home","social","travel","study","spiritual"];
  var domH="<div class=\"dg\">";
  for(var di=0;di<dOrder.length;di++){
    var dk=dOrder[di];
    if(!info[dk]||!info[dk].length)continue;
    var m=DM[dk];
    domH+="<div class=\"db\"><span class=\"di\">"+m.i+"</span><div class=\"dt\">"+m.t+"</div>"+bul(info[dk])+"</div>";
  }
  domH+="</div>";
  var timeH="";
  if(info.time&&info.time.length){
    timeH="<div class=\"time-box\"><div class=\"gml\">\u23F3 Timp</div>"+bul(info.time)+"</div>";
  }
  var advH="";
  if(info.advice&&info.advice.length){
    advH="<div class=\"ab\"><span class=\"abi\">\uD83D\uDCAC</span><div class=\"abt\">Sfatul Principal</div><div class=\"abx\">";
    for(var i=0;i<info.advice.length;i++)advH+="<p>"+e(info.advice[i])+"</p>";
    advH+="</div></div>";
  }
  var sub=info.intro?e(info.intro[0]).substring(0,130)+"...":"";
  return "<div class=\"cp\">"+
    "<div class=\"cph\" onclick=\"tp("+String.fromCharCode(39)+id+String.fromCharCode(39)+")\">"+
    "<span class=\"cpn\">"+n+"</span>"+
    "<div class=\"cpta\"><div class=\"cpt\">"+e(gn(n))+"</div><div class=\"cps\">"+sub+"</div></div>"+
    "<span class=\"cpx\" id=\""+id+"x\">\u25BC</span></div>"+
    "<div class=\"cpb\" id=\""+id+"\"><div class=\"cpi\">"+
    (info.intro?"<div class=\"intro\">"+info.intro.map(function(p){return e(p)}).join(" ")+"</div>":"")+
    kwH+gmH+domH+timeH+advH+
    "</div></div></div>";
}
function tp(id){
  document.getElementById(id).classList.toggle("open");
  document.getElementById(id+"x").classList.toggle("open");
}
function doSearch(){
  var v1=document.getElementById("n1").value.trim();
  var v2=document.getElementById("n2").value.trim();
  var res=document.getElementById("res");
  document.getElementById("ts").value="";
  if(!v1&&!v2){res.innerHTML="";return}
  if(v1&&!v2){showCard(parseInt(v1));return}
  if(!v1&&v2){showCard(parseInt(v2));return}
  var a=parseInt(v1),b=parseInt(v2);
  if(a<1||a>36||b<1||b>36){res.innerHTML="<div class=\"nr\"><div class=\"i\">\u26A0\uFE0F</div><p>Numerele trebuie s\u0103 fie \u00eentre 1 \u0219i 36</p></div>";return}
  if(a===b){res.innerHTML="<div class=\"nr\"><div class=\"i\">\uD83D\uDD00</div><p>Introdu dou\u0103 numere diferite</p></div>";return}
  var h="";
  var k1=a+"+"+b,k2=b+"+"+a;
  if(C[k1])h+=combo(k1,C[k1]);
  if(C[k2])h+=combo(k2,C[k2]);
  if(!h)h="<div class=\"nr\"><div class=\"i\">\uD83D\uDD0D</div><p>Nu s-a g\u0103sit combina\u021Bia "+a+"+"+b+"</p></div>";
  h+="<div class=\"sl\">Detalii despre c\u0103r\u021Bi</div>";
  h+=panel(a)+panel(b);
  res.innerHTML=h;
  res.scrollIntoView({behavior:"smooth",block:"start"});
}
function showCard(n){
  var res=document.getElementById("res");
  if(n<1||n>36){res.innerHTML="<div class=\"nr\"><p>Num\u0103r invalid</p></div>";return}
  var h=panel(n);
  h+="<div class=\"sl\">Toate combina\u021Biile pentru Cartea "+n+"</div>";
  var keys=Object.keys(C);
  for(var i=0;i<keys.length;i++){
    var p=keys[i].split("+");
    if(parseInt(p[0])===n||parseInt(p[1])===n)h+=combo(keys[i],C[keys[i]]);
  }
  res.innerHTML=h;
  setTimeout(function(){
    var b=res.querySelector(".cpb");
    var x=res.querySelector(".cpx");
    if(b)b.classList.add("open");
    if(x)x.classList.add("open");
  },50);
  res.scrollIntoView({behavior:"smooth",block:"start"});
}
var tt;
function tsd(){clearTimeout(tt);tt=setTimeout(tsf,300)}
function tsf(){
  var q=document.getElementById("ts").value.trim().toLowerCase();
  var res=document.getElementById("res");
  if(q.length<2){res.innerHTML="";return}
  var w=q.split(/\s+/);
  var matches=[];
  var keys=Object.keys(C);
  for(var i=0;i<keys.length;i++){
    var p=keys[i].split("+");
    var f=(C[keys[i]]+" "+gn(p[0])+" "+gn(p[1])).toLowerCase();
    var ok=true;
    for(var j=0;j<w.length;j++){if(f.indexOf(w[j])<0){ok=false;break}}
    if(ok)matches.push(keys[i]);
  }
  if(!matches.length){res.innerHTML="<div class=\"nr\"><div class=\"i\">\uD83D\uDD0D</div><p>Niciun rezultat pentru \""+e(q)+"\"</p></div>";return}
  var h="<div style=\"color:#9a8cbf;font-size:.85em;margin-bottom:10px\">"+matches.length+" rezultate pentru \""+e(q)+"\"</div>";
  var limit=Math.min(matches.length,50);
  for(var i=0;i<limit;i++)h+=combo(matches[i],C[matches[i]]);
  if(matches.length>50)h+="<div style=\"text-align:center;color:#7a6a9a;padding:15px\">...\u0219i \u00eenc\u0103 "+(matches.length-50)+" rezultate.</div>";
  res.innerHTML=h;
}
document.getElementById("n1").addEventListener("keydown",function(ev){if(ev.key==="Enter")doSearch()});
document.getElementById("n2").addEventListener("keydown",function(ev){if(ev.key==="Enter")doSearch()});
["n1","n2"].forEach(function(id){document.getElementById(id).addEventListener("input",function(){
  if(document.getElementById("n1").value.trim()&&document.getElementById("n2").value.trim())doSearch();
})});
var g=document.getElementById("cg");
for(var i=1;i<=36;i++){
  (function(i){
    var b=document.createElement("div");
    b.className="cb";
    b.innerHTML="<span class=\"n\">"+i+"</span>"+e(gn(i));
    b.onclick=function(){document.getElementById("n1").value=i;document.getElementById("n2").value="";document.getElementById("ts").value="";showCard(i)};
    g.appendChild(b);
  })(i);
}

</script>
