orare, Decădere (lentă), Uzură, Stricăciune (progresivă), Coroziune", "Defecte, Imperfecțiuni, Ceva în neregulă, Vicii ascunse, Probleme mărunte (care se adună)", "Murdărie, Dezordine, Igienă precară, Contaminare, Impurități", "Dăunători (literal - șoareci, insecte, paraziți; sau figurativ - persoane/situații enervante, toxice)", "Sabotaj (subtil), Subminare, Activități \"pe sub masă\"", "Boală (cauzată de stres, igienă, paraziți, deficiențe), Epuizare (lentă), Slăbiciune progresivă"], "general": ["Cartea 23, Pierderile, este un indicator al pierderii sau diminuării care se întâmplă treptat, aproape pe neobservate, până când efectul devine evident. Fie că este vorba de bani, obiecte, energie, sănătate, timp sau încredere, Pierderile erodează încet, dar sigur. Această carte este strâns legată de sentimente de stres, anxietate profundă și îngrijorare persistentă – acele gânduri sau situații care ne macină constant. Semnalează adesea că ceva nu este în regulă, că există defecte ascunse, imperfecțiuni sau un proces de deteriorare în curs. Poate indica furturi mărunte sau senzația că resursele se scurg fără explicație. De asemenea, poate reprezenta dăunători în sens literal (șoareci, insecte, paraziți) sau figurativ (persoane enervante, bârfitoare, toxice, care \"rod\" armonia sau reputația). Energia Pierderilor este negativă, stresantă, agitată și asociată cu scăderea și descompunerea. Apariția lor cere atenție imediată la detalii și acțiune rapidă pentru a identifica și stopa sursa pierderii, a stresului sau a deteriorării înainte ca paguba să fie prea mare."], "love": ["Erodarea lentă a relației din cauza stresului, a grijilor cotidiene, a certurilor mărunte, dar repetate. Pierderea treptată a magiei.", "Anxietate și îngrijorări persistente legate de partener sau de viitorul relației. Suspiciuni care macină încrederea.", "Sentimentul că lipsește ceva important în relație sau că lucrurile \"nu sunt în regulă\".", "Poate indica mici trădări sau infidelități (furt de afecțiune/timp) sau pur și simplu o perioadă foarte stresantă pentru cuplu."], "career": ["Pierderi mici, dar constante la locul de muncă (furt de materiale, timp pierdut). Diminuarea resurselor sau a bugetului alocat.", "Stres extrem la locul de muncă, anxietate legată de performanță, termene limită sau relații colegiale. Mediu de lucru \"rozător\".", "Deteriorarea calității muncii, erori frecvente, proiecte care \"scârțâie\" sau sunt subminate.", "Prezența unor colegi enervanți, bârfitori sau care se angajează în sabotaj subtil.", "Sentimentul de a fi subapreciat, exploatat sau că munca îți consumă toată energia. Risc de pierdere treptată a poziției sau a relevanței."], "health": ["Scăderea graduală a energiei și vitalității, epuizare cronică indusă de stres sau boală.", "Afecțiuni cauzate sau agravate de stres, anxietate, igienă deficitară sau expunere la dăunători/paraziți.", "Poate indica deficiențe nutriționale (corpul nu primește/absoarbe ce are nevoie) sau probleme de deteriorare/decay (ex: probleme dentare semnificative).", "Îngrijorări ipohondrice sau anxietate persistentă legată de starea de sănătate.", "Boli care macină lent organismul sau probleme de sănătate care se agravează treptat."], "money": ["Pierderi financiare mici, dar repetate, care se adună în timp. Bani care \"dispar\" pe cheltuieli necontrolate sau furturi mărunte.", "Stres și anxietate majoră legate de bani, grija zilei de mâine.", "Erodarea economiilor sau scăderea treptată a veniturilor.", "Risc de furt (din portofel, cont) sau de a fi înșelat cu sume mici, dar în mod repetat. Atenție la taxe ascunse, erori de facturare.", "Defecte în sistemul de management financiar personal."], "home": ["Pierderea sau dispariția unor obiecte în casă. Risc de furt mărunt (atenție la personalul angajat sau vizitatori).", "Deteriorarea treptată a casei sau a bunurilor din casă (uzură, igrasie, probleme cu dăunătorii). Necesită reparații/curățenie.", "Atmosferă stresantă în familie, \"cicâleală\" constantă, griji mărunte care tensionează relațiile.", "Prezența dăunătorilor (șoareci, gândaci, molii etc.). Probleme legate de murdărie sau dezordine cronică.", "Sentimentul că resursele familiei sunt risipite pe lucruri mărunte sau probleme persistente."], "social": ["Erodarea lentă a prieteniilor prin neglijență, bârfe sau mici conflicte repetate.", "Prezența unor persoane enervante, bârfitoare sau \"parazitare\" în cercul social.", "Stres sau anxietate în interacțiunile sociale, teama de judecată sau respingere.", "Pierderea treptată a încrederii în anumiți prieteni sau în grupul social.", "Atmosferă socială \"roasă\" de invidie sau critici mărunte."], "travel": ["Multe mici neplăceri, enervări și stres în timpul călătoriei (întârzieri minore, aglomerație, condiții proaste).", "Risc crescut de furt din buzunare, de bagaje sau de obiecte personale. Necesită vigilență sporită.", "Călătorie stresantă, obositoare, care consumă energia.", "Deteriorarea planurilor de călătorie prin acumularea de mici probleme."], "study": ["Stres și anxietate legate de examene sau performanță academică, care afectează concentrarea.", "Dificultăți în a reține informația, senzația că uiți repede ce ai învățat. Cunoștințe care se pierd.", "Descoperirea unor erori sau defecte în notițe, materiale de curs sau lucrări. Necesită corecturi.", "Un mediu de studiu stresant, \"toxic\" sau plin de distrageri enervante.", "Pierderea treptată a entuziasmului sau a motivației pentru învățare din cauza dificultăților sau a stresului."], "spiritual": ["Îndoieli, frici și îngrijorări mărunte care subminează credința și practica spirituală.", "Sentimentul de a fi secătuit energetic sau spiritual, ca și cum ceva sau cineva îți consumă resursele interioare.", "Distrageri mentale persistente și enervante în timpul meditației sau rugăciunii. \"Zgomot\" mental.", "Necesitatea de a identifica și curăța tiparele mentale negative, fricile sau atașamentele \"toxice\" care erodează pacea spirituală.", "Pierderea treptată a conexiunii sau a disciplinei spirituale."], "time": ["Indică un proces gradual, care se desfășoară în timp, adesea lent și insidios (eroziune, deteriorare).", "Se referă la ceva care se întâmplă ACUM și cauzează stres sau pierdere.", "Nu are un termen fix, dar sugerează că problema persistă și se poate agrava dacă nu este adresată. Asocieri posibile cu cifra 23."], "advice": ["al Cărții: Acționează rapid pentru a stopa pierderea și a elimina sursa stresului! Pierderile sunt un semnal că ceva nu este în regulă și că o situație se deteriorează sau resursele tale sunt diminuate treptat. Identifică problema – fie că este vorba de stres, o persoană negativă, un defect ascuns sau o pierdere concretă – și ia măsuri imediate pentru a o remedia înainte de a fi prea târziu. Fii atent la detalii, protejează-ți bunurile și energia și fă curățenie (la propriu și la figurat)! FELICITĂRI! ai aprofundat informațiile despre Cartea 23 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "26": {"intro": ["Cartea numărul 26, Cunoașterea, este gardianul secretelor, al cunoașterii ascunse, dar și al educației, studiului și informației în general. Este o carte a misterului, dar și a revelației care vine prin cercetare și învățare."], "keywords": ["Secrete, Informații ascunse/confidențiale, Ceva necunoscut/nedezvăluit, Mister", "Cunoaștere, Învățătură, Educație, Studii, Cercetare, Informație (valoroasă)", "Expertiză, Specializare, Cunoștințe aprofundate, Înțelepciune (dobândită prin studiu)", "Documente (importante), Contracte (detaliile fine), Registre, Arhive, Jurnale, Manuscrise", "Enigme, Lucruri care trebuie investigate/descoperite", "Revelație, Descoperire (a unui secret sau adevăr), Clarificare (prin informație)", "Proiecte (în fază de plan/confidențiale), Planuri secrete", "Introversiune, Discreție, Rezervă, Tăcere, Persoană tăcută/studioasă/cultă", "Talente ascunse, Cunoștințe nevalorificate încă", "Carte (literal), Bibliotecă, Școală, Universitate, Editură, Domeniu academic"], "general": ["Cartea 26, Cunoașterea, are o natură duală fascinantă. Pe de o parte, reprezintă tot ceea ce este ascuns, secret, necunoscut sau confidențial. Indică prezența unor informații care nu sunt încă disponibile sau a unor secrete care așteaptă să fie dezvăluite. Poate sugera mister, enigme sau necesitatea de a privi dincolo de suprafață. Pe de altă parte, Cunoașterea este simbolul principal al cunoașterii, educației, studiului și învățăturii. Reprezintă procesul de acumulare a informațiilor, cercetarea, dezvoltarea expertizei și înțelepciunea dobândită prin studiu. Poate indica documente importante, registre contabile sau chiar o carte literală care conține informații valoroase. Contextul și cărțile învecinate vor arăta dacă accentul cade pe aspectul de \"secret\" (Cartea închisă) sau pe cel de \"cunoaștere/revelație\" (Cartea deschisă). Poate simboliza și o persoană introvertită, rezervată, dar adesea foarte cultă sau un proiect aflat încă în faza de dezvoltare secretă."], "love": ["Existența unor secrete în relație, sentimente sau aspecte ale trecutului care nu au fost comunicate. Poate indica o aventură ascunsă sau gânduri neîmpărtășite.", "O relație ținută secretă față de familie sau prieteni.", "Descoperirea unor informații importante despre partener, care pot schimba dinamica relației (pozitiv sau negativ).", "Nevoia de a învăța și de a cunoaște mai bine partenerul la un nivel mai profund, intelectual sau emoțional.", "Un partener misterios, rezervat, studios sau greu de \"citit\"."], "career": ["Informații confidențiale la locul de muncă, proiecte secrete, secrete comerciale. Nevoia de discreție.", "Proces de învățare continuă, training, cursuri de specializare, acumulare de expertiză esențială pentru carieră. Doctorat, cercetare.", "Documente oficiale importante: contracte (cu clauze ce necesită atenție), rapoarte detaliate, audituri, registre contabile, planuri strategice.", "Descoperirea unor informații cheie, dezvăluirea unor secrete sau a unor strategii ascunse (ale competitorilor sau interne).", "Profesii din domeniul educației, cercetării, scrisului, editării, contabilității, investigațiilor, spionajului, biblioteconomiei, arhivisticii."], "health": ["O problemă de sănătate ascunsă, nediagnosticată, ale cărei cauze sunt necunoscute. Necesită investigații suplimentare.", "Informații medicale importante care urmează să fie descoperite sau comunicate (rezultate complexe, studii).", "Cercetare personală sau medicală despre o anumită afecțiune. Studierea dosarelor medicale.", "Nevoia de educație pentru sănătate, de a învăța cum să gestionezi o condiție medicală.", "Păstrarea confidențialității asupra unor informații medicale."], "money": ["Existența unor finanțe ascunse, conturi nedeclarate, datorii secrete sau active necunoscute.", "Contabilitate detaliată, audit financiar, registre, bilanțuri, documente fiscale complexe.", "Necesitatea de a cerceta amănunțit o investiție sau un produs financiar înainte de a lua o decizie. Descoperirea unor riscuri ascunse.", "Descoperirea unor secrete financiare, erori contabile sau fraude ascunse.", "Necesitatea sau deținerea unei expertize financiare aprofundate."], "home": ["Secrete de familie, istorii neștiute, \"schelete în dulap\". Lucruri care nu se discută deschis.", "Documente importante legate de casă, proprietate, moșteniri, testamente.", "Cercetarea arborelui genealogic, descoperirea originilor sau a unor rude necunoscute.", "Un membru al familiei foarte studios, rezervat, care preferă lectura sau activitățile intelectuale solitare.", "Prezența unei biblioteci sau a unui spațiu dedicat studiului în casă. Păstrarea vieții de familie private."], "social": ["Secrete păstrate între prieteni sau informații confidențiale împărtășite în cerc restrâns.", "Un prieten erudit, studios, rezervat sau care știe multe, dar vorbește puțin.", "Descoperirea unor aspecte neașteptate sau ascunse din viața prietenilor.", "Apartenența la grupuri de studiu, cluburi de carte sau cercuri de interese intelectuale.", "Preferința pentru discreție în viața socială, evitarea expunerii excesive."], "travel": ["Călătorii cu scop de studiu sau cercetare. Deplasări la biblioteci, arhive, universități.", "O destinație misterioasă, neobișnuită sau despre care se știu puține lucruri. Explorarea necunoscutului.", "Planuri de călătorie ținute secret sau care conțin elemente nedezvăluite.", "Călătorie pentru a descoperi ceva anume (un loc, o informație, o persoană)."], "study": ["Cartea definitorie pentru educație. Reprezintă școala, cursurile, examenele, manualele, diplomele, procesul de învățare în sine.", "Perioadă de studiu intens, concentrare, cercetare, acumulare de cunoștințe.", "Dezvoltarea și aprofundarea expertizei într-un domeniu specific.", "Descoperirea unor noi domenii de interes sau a unor talente intelectuale ascunse."], "spiritual": ["Accesul la cunoaștere ezoterică, texte sacre, învățături secrete sau tradiții mistice.", "Studiul aprofundat al filozofiilor spirituale, al textelor religioase sau al practicilor metafizice.", "Procesul de descoperire interioară, revelarea unor adevăruri ascunse despre sine și Univers. Introspecție.", "Poate face referire la concepte precum Registrul Akashic sau cunoașterea înnăscută a sufletului.", "Discreție în practica spirituală sau apartenența la grupuri spirituale închise."], "time": ["Indică o perioadă în care informația nu este încă disponibilă sau este ascunsă. Dezvăluirea se va face mai târziu, la momentul potrivit.", "Sugerează necesitatea unei perioade de studiu, cercetare sau așteptare înainte de a acționa sau a înțelege pe deplin.", "Nu oferă un termen fix, ci accentuează elementul necunoscut sau în curs de desfășurare.", "Uneori asociată cu cifra 26."], "advice": ["al Cărții: Caută cunoașterea, fii curios și pregătit pentru descoperiri! Cunoașterea te încurajează să aprofundezi, să studiezi, să cercetezi și să nu te oprești la suprafață. Fii deschis la revelații și la informații noi, chiar dacă acestea pot fi surprinzătoare sau pot demonta vechi credințe. În același timp, respectă confidențialitatea și păstrează discreția atunci când este necesar. Adevărul și cunoașterea așteaptă să fie descoperite. FELICITĂRI! ai aprofundat informațiile despre Cartea 26 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "4": {"intro": ["Cartea cu numărul 4, Locuința, este simbolul central al stabilității, securității, familiei și al căminului personal. Este ancora noastră în lume, fundația pe care ne construim viața privată."], "keywords": ["Casă, Locuință, Domiciliu, Cămin, Proprietate", "Familie (cea apropiată, unitatea familială, clanul)", "Stabilitate, Securitate, Siguranță, Protecție, Ancorare", "Confort, Intimitate, Viață privată, Spațiu personal", "Rădăcini, Origini, Tradiție, Strămoși (uneori)", "Bază, Fundație (fizică sau metaforică), Structură", "Proprietate imobiliară, Construcție, Imobiliare", "Mediu imediat, Vecinătate, Comunitate apropiată", "• Apartenență, Statornicie, Rutină domestică"], "general": ["Cartea 4, Locuința , vorbește despre tot ceea ce înseamnă \"acasă\": locul fizic în care locuim, dar și sentimentul de apartenență, siguranță și stabilitate pe care ni-l oferă. Este o carte profund legată de familia apropiată, de rădăcini și tradiții. Apariția ei indică adesea o perioadă de consolidare, de concentrare pe viața domestică și pe crearea unui mediu sigur și confortabil. Poate semnala evenimente concrete legate de proprietăți imobiliare (cumpărare, vânzare, renovare) sau pur și simplu accentuează importanța fundației pe care stă viața noastră (fie ea familială, profesională sau emoțională). Energia Locuinței este protectoare, familiară, stabilă și de durată. Spre deosebire de cărțile de mișcare, Locuința ne invită la statornicie și la aprecierea intimității și a vieții private."], "love": ["Indică o relație stabilă, sigură, bazată pe confort reciproc și planuri de viitor comune. Armonie în viața domestică a cuplului.", "Dorința sau procesul de a construi un cămin împreună, de a se stabili. Poate prevesti căsătorie sau coabitare (lângă cărți relevante).", "Influența puternică a familiei (proprii sau a partenerului) asupra relației. Importanța acceptării și integrării familiale.", "O conexiune matură, care oferă siguranță emoțională și un refugiu. Nevoia de intimitate este accentuată."], "career": ["Un loc de muncă stabil și sigur, o companie cu tradiție sau o poziție pe termen lung. Sentiment de securitate profesională.", "Posibilitatea reală de a lucra de acasă sau dezvoltarea unei activități profesionale de la domiciliu.", "O afacere de familie, moștenită sau construită împreună cu membrii familiei.", "Profesii legate de imobiliare, construcții, arhitectură, design interior sau administrarea proprietăților.", "Construirea unei fundații solide în carieră, reputație bună și stabilitate."], "health": ["Stare de sănătate stabilă, fără fluctuații majore. Sau, dacă există probleme, indică nevoia de recuperare acasă, într-un mediu familiar și confortabil.", "Atrage atenția asupra importanței unui mediu de locuit sănătos (igienă, aerisire, siguranță, lipsa stresului domestic).", "Simbolic, poate fi legată de structura fizică fundamentală a corpului (oase, schelet) sau de nevoia de împământare și echilibru.", "Beneficiile unei rutine stabile (mese regulate, somn suficient acasă) pentru sănătate."], "money": ["Securitate financiară, venituri stabile și predictibile. Buget echilibrat.", "Tranzacții sau investiții legate de proprietăți imobiliare. Cumpărarea sau vânzarea unei case/apartament.", "Administrarea bugetului gospodăriei, cheltuieli casnice.", "Bani care provin din familie sau sunt legați de o afacere de familie. Moșteniri imobiliare.", "Accent pe stabilitatea financiară pe termen lung și pe construirea unei baze materiale sigure."], "home": ["Reprezentarea directă și centrală a locuinței fizice și a familiei nucleu (cei cu care locuiești sau familia de origine).", "O perioadă de armonie, stabilitate, confort și siguranță în cămin. Bună înțelegere între membrii familiei.", "Focalizare pe activități domestice: renovări, redecorări, curățenie, organizarea gospodăriei.", "Legătura cu rădăcinile, originile, tradițiile familiale. Importanța conexiunilor de familie."], "social": ["Relații de prietenie solide, vechi, stabile, prieteni foarte apropiați, considerați parte din familie.", "Preferința pentru socializarea acasă, în cadru restrâns și intim (ex: cine cu prietenii acasă).", "Un cerc social stabil, nu neapărat foarte larg, dar de încredere.", "Valorizează intimitatea și confortul în relațiile sociale."], "travel": ["De obicei, nu indică deplasări. Semnifică stabilitatea la domiciliu, preferința pentru a sta acasă.", "Dacă apar călătorii, acestea sunt cel mai probabil legate de vizitarea familiei sau întoarcerea acasă după o absență.", "Nevoia de a avea o bază sigură la care să te întorci."], "study": ["Studiul eficient realizat acasă, într-un mediu familiar și liniștit.", "Învățarea sau aprofundarea unor cunoștințe legate de istorie familială, genealogie, tradiții, meșteșuguri domestice.", "Studii în domenii conexe casei: imobiliare, arhitectură, design interior, construcții, managementul proprietății.", "Consolidarea cunoștințelor, crearea unei baze solide de informații."], "spiritual": ["Găsirea unui centru spiritual în propriul cămin. Amenajarea unui spațiu pentru meditație sau rugăciune acasă.", "Reconectarea cu tradițiile spirituale ale familiei sau ale locului de origine. Legătura cu strămoșii.", "Sentimentul de siguranță și împământare oferit de practica spirituală personală, realizată în intimitate.", "Construirea unei fundații spirituale solide și stabile."], "time": ["Indică durată, stabilitate, permanență (relativă). Nu este asociată cu viteza.", "Se referă la o perioadă de consolidare, la prezentul stabil sau la planuri pe termen mediu și lung.", "Evenimentele legate de Casă necesită timp pentru a se materializa sau sunt deja stabilite.", "Uneori asociată cu cifra 4 (4 zile, 4 săptămâni, 4 luni - dar mai degrabă indică stabilitate decât un termen fix)."], "advice": ["al Cărții: Concentrează-te pe fundația ta și creează-ți un spațiu sigur! Casa te îndeamnă să îți prețuiești căminul, legăturile de familie și viața privată. Este un moment excelent pentru a investi în stabilitate, confort și securitate, atât fizic (în locuința ta), cât și emoțional (în relațiile apropiate). Ancorează-te, conectează-te cu rădăcinile tale și bucură-te de sentimentul de apartenență. FELICITĂRI! ai aprofundat informațiile despre Cartea 4, acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "32": {"intro": ["Cartea numărul 32, Intuiția, ne conectează cu tărâmul emoțiilor profunde al subconștientului, dar și cu recunoașterea publică și romantismul. Este o carte a receptivității, a ciclurilor și a emoțiilor profunde."], "keywords": ["Emoții (profunde, adesea fluctuante), Sentimente, Lumea interioară, Suflet", "Intuiție, Abilități psihice, Presentimente, Subconștient, Vise", "Recunoaștere (publică), Onoare, Reputație (bună), Faimă (în special artistică/creativă), Succes (recunoscut)", "Admirație, Popularitate, Farmec (magnetic, subtil)", "Romantism, Idilă, Atmosferă romantică, Curtoazie (în sens emoțional)", "Imaginație, Creativitate, Inspirație (artistică, intuitivă), Fantezie", "Cicluri (lunare, emoționale, hormonale, feminine), Fluctuații, Ritmuri naturale", "Noapte, Seară, Întuneric (ca spațiu al misterului și intuiției)", "Iluzie (uneori), Glamour, Magie (lunară), Mister", "Feminitate (aspectul intuitiv/emoțional/ciclic), Energie Yin", "Sensibilitate, Receptivitate"], "general": ["Cartea 32, Intuiția, guvernează lumea interioară a emoțiilor și a intuiției. Este un indicator puternic al sentimentelor profunde, al stărilor sufletești și al mesajelor primite din subconștient sau prin abilități psihice. Ascultarea intuiției este esenț ător! Succes"]}, "1": {"intro": ["Această carte, purtând numărul 1, deschide pachetul și reprezintă NOTIFICĂRILE! Este scânteia inițială, impulsul, mesagerul rapid al noutății și al mișcării."], "keywords": ["Vești, Mesaje (în diverse forme: verbale, scrise, digitale, știri)", "Informații Noi, Noutate, Anunțuri", "Vizitatori, Sosiri (neașteptate sau așteptate), Întâlniri", "Mișcare Rapidă, Viteză, Acțiune, Activitate", "Progres, Avansare, Dinamism, Impuls", "Începuturi, Inițiativă, Start", "Comunicații, Conexiuni noi", "Sport, Tinerețe, Energie fizică", "Mijloace de transport rapide (simbolic)"], "general": ["Cartea 1, Notificările, semnalează mișcare rapidă și noutate în toate aspectele vieții. Este cartea veștilor și a informațiilor care sosesc cu repeziciune, schimbând peisajul actual. Principalul ei mesaj este sosirea iminentă a unor știri, mesaje (indiferent de canalul de comunicare), informații cruciale sau chiar a unei persoane (o vizită). Energia sa este una de acțiune și progres; indică faptul că lucrurile stătute încep să avanseze, blocajele se dizolvă, iar o situație statică primește un impuls necesar pentru a se debloca. Reprezintă adesea începutul unei noi faze, proiect sau direcții. Energia este dinamică, plină de vitalitate (asociată uneori cu tinerețea sau sportul), aducând un suflu proaspăt și îndemnând la inițiativă. Este esențial să fii receptiv la semnalele și informațiile care apar acum și să fii pregătit pentru comunicare accelerată și adaptare rapidă la schimbările pe care le anunță."], "love": ["Primești vești rapide de la sau despre persoana iubită/un interes amoros. Pot fi mesaje directe, informații aflate sau noutăți semnificative.", "Poate anunța sosirea unei persoane noi în viața ta sentimentală, cineva de obicei activ, dinamic, poate mai tânăr sau mereu în mișcare.", "Relația existentă intră într-o fază de progres, dinamism sau mișcare (ex: discuții care avansează, decizii rapide).", "Indică începutul unei noi conexiuni sau flirt; în fu ul la o instituție de elită, la un program special sau la resurse educaționale valoroase.", "Descoperirea potențialului intelectual și a căii corecte de studiu. SOLUȚIILE"], "spiritual": ["Un moment de iluminare, un breakthrough spiritual major, descoperirea unui adevăr esențial. Acces la înțelepciune profundă.", "Găsirea cheii către propria cale spirituală, înțelegerea misiunii personale sau a destinului.", "Primirea unor răspunsuri clare și definitive la întrebări spirituale fundamentale.", "Certitudine interioară.", "Accesarea unor niveluri superioare de conștiință, deblocarea unor abilități psihice sau a potențialului spiritual latent.", "Eliberare spirituală prin înțelegere, acceptare și găsirea soluției interioare."], "time": ["Indică faptul că soluția, răspunsul sau momentul decisiv este foarte aproape sau chiar aici și acum.", "Semnifică certitudine și rezolvare iminentă. Perioada de căutare sau așteptare se încheie.", "Este un moment cheie, un punct de cotitură care se întâmplă acum sau în viitorul foarte apropiat.", "Uneori asociată cu cifra 33. SOLUȚIILE"], "advice": ["al Cărții: Acționează cu încredere, soluția este la tine! Cartea Soluțiile este un semn foarte puternic că ai capacitatea și resursele necesare pentru a depăși orice obstacol și a deschide orice ușă. Fii atent la răspunsurile și oportunitățile care îți apar în cale, deoarece sunt extrem de importante. Ai încredere în direcția care ți se revelează și folosește \"cheia\" pe care o deții pentru a accesa succesul și împlinirea. SOLUȚIILE FELICITĂRI! ai aprofundat informațiile despre Cartea 33 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "29": {"intro": ["Cartea numărul 29, Femininul, este cealaltă carte- semnificator esențială a pachetului, întruchipând energia feminină și reprezentând o figură feminină centrală."], "keywords": ["Cea care pune întrebarea (dacă este femeie)", "Partenera principală (soție, iubită, logodnică - pentru un bărbat)", "Femeie importantă (mamă, soră, fiică, prietenă apropiată, șefă, clientă etc. - în funcție de context)", "Energie feminină (Yin)", "Intuiție, Receptivitate, Sensibilitate, Subtilitate", "Emoție, Sentimente, Inimă (ca sediu al emoțiilor)", "Grija (față de alții), Nurturing, Ocrotire, Compasiune, Maternitate (simbolică)", "Feminitate, Grație, Frumusețe (interioară)", "Femeie (în general)", "Identitate (pentru o femeie)", "Prezență feminină semnificativă"], "general": ["Cartea 29, Femininul, asemenea Cărții Masculinului, funcționează în primul rând ca un semnificator, reprezentând o persoană cheie. Identificarea acestei persoane este primul pas: Pentru o femeie: Cartea Femininul este ea însăși. Devine punctul focal al etalării, iar cărțile din jur îi descriu situația, emoțiile, intuiția, rolul și perspectivele. Pentru un bărbat: Cartea Femininul reprezintă, de obicei, cea mai importantă femeie din viața sa în contextul întrebării – cel mai frecvent partenera romantică (soție, iubită). Poate fi, de asemenea, mama, o soră, o fiică adultă, o prietenă foarte apropiată sau o figură feminină cu autoritate (șefă). Dincolo de a reprezenta o persoană, Femininul aduce în etalare energia feminină arhetipală (Yin). Aceasta este legată de intuiție, emoție, receptivitate, sensibilitate, grijă și nurturing. Spre deosebire de energia Yang a Domnului (acțiune, logică), energia Yin este mai interioară, subtilă și orientată spre simțire și conectare emoțională. Cartea în sine este neutră; calitățile specifice, starea și situația femeii reprezentate sunt descrise de cărțile care o înconjoară."], "love": ["Pentru un bărbat: Ea este partenera principală. Cărțile din jur descriu cum este ea în relație (iubitoare - Inima, angajată - Inelul, înșelătoare - Șarpele, confuză - Norii etc.), ce simte, ce intuiții are sau cum percepe ea relația.", "Pentru o femeie: Ea este în centrul propriei vieți amoroase. Cărțile din jur arată starea sa emoțională, intuițiile legate de partener, rolul ei în relație sau provocările sale amoroase.", "Accentuează importanța intuiției, a emoțiilor și a grijii reciproce în dinamica relațională."], "career": ["Reprezintă femeia și situația sa profesională, sau o femeie cheie (șefă, colegă influentă, clientă importantă) pentru un bărbat.", "Cărțile din jur detaliază rolul său profesional, abordarea sa (poate mai intuitivă sau orientată spre oameni), satisfacția sau dificultățile întâmpinate, relațiile de muncă.", "Poate indica nevoia unei abordări bazate pe intuiție, diplomație sau abilități interpersonale în carieră. Roluri în domenii de îngrijire, resurse umane, arte, terapie."], "health": ["Reflectă starea de sănătate a femeii relevante. Cărțile învecinate oferă detalii despre vitalitate sau probleme specifice.", "Poate sugera afecțiuni specifice femeilor (ginecologice, hormonale, legate de ciclicitate) sau probleme de sănătate influențate puternic de starea emoțională.", "Subliniază importanța intuiției în ascultarea corpului și a auto-îngrijirii (nurturing)."], "money": ["Situația financiară, deciziile și abordarea femeii respective. Decizii financiare posibil influențate de intuiție, emoții sau nevoia de securitate.", "Cărțile din jur (ex: Ursul, Peștii, Șoarecii) vor indica starea finanțelor sale, dacă este generoasă, precaută, stresată etc.", "Abordare grijulie și prudentă a resurselor financiare."], "home": ["Femeia centrală a familiei (consultanta, soția, mama, fiica). Rolul ei emoțional și de îngrijire în cămin.", "Starea sa de spirit acasă, intuițiile legate de familie, relația cu ceilalți membri – descrise de cărțile din apropiere.", "Accent pe aspectul nurturing, de creare a unui mediu familial cald și primitor."], "social": ["Poate indica o prietenă foarte importantă, confidenta.", "Descrie consultanta femeie în context social sau viața socială a partenerei (dacă e cazul).", "Cărțile vecine arată natura interacțiunilor ei sociale, punând accent pe conexiunea emoțională și suportul reciproc."], "travel": ["Călătorii efectuate de această femeie sau împreună cu ea.", "Scopul călătoriei poate fi emoțional (vizitarea celor dragi) sau ghidat de intuiție. Experiențele ei sunt relevate de combinații."], "study": ["Consultanta femeie în rol de studentă sau în proces de învățare.", "Influența unei profesoare, mentore sau colege asupra studiilor.", "Modul ei de a învăța (probabil intuitiv, receptiv, poate mai bun la materiile umaniste sau artistice."], "spiritual": ["Calea sau perspectiva spirituală a femeii respective. Accent pe intuiție, receptivitate, conectare emoțională cu divinul.", "Integrarea energiei Yin în practica spirituală. Conexiunea cu arhetipurile Divinului Feminin.", "Cărțile din jur descriu stadiul său spiritual, darurile sau provocările întâmpinate."], "time": ["Doamna nu este o carte de timp. Evenimentele legate de ea se desfășoară conform timpului indicat de cărțile înconjurătoare.", "Uneori asociată cu cifra 29."], "advice": ["al Cărții: Acordă atenție femeii semnificative (sau ție însăți)! Femininul te direcționează să analizezi persoana pe care o reprezintă. Înțelegerea situației sale, a emoțiilor, intuițiilor și influențelor (așa cum sunt descrise de cărțile din jur) este vitală. Recunoaște și valorizează energia feminină a intuiției, receptivității, grijii și conexiunii emoționale în contextul analizat. FELICITĂRI! ai aprofundat informațiile despre Cartea 29 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "11": {"intro": ["Cartea numărul 11, Conflictul, semnalează în principal tensiuni, acțiuni repetitive, existența unor certuri sau dezbateri aprinse. Indică un moment în care conflictele pot ieși la suprafață, tiparele repetitive devin evidente și energia fizică sau sexuală poate fi accentuată."], "keywords": ["Conflict, Ceartă Dezacord, Discordie", "Argumente, Dezbateri aprinse, Discuții tensionate repetitive", "Critică Mustrare, Pedeapsă, Disciplină impusă", "Acțiuni repetitive, Rutină (uneori dăunătoare), Cicluri", "Activitate fizică, Sport, Anduranță", "Energie sexuală Pasiune intensă, Dorință fizică", "Stres, Tensiune nervoasă, Frecușuri", "Abuz verbal sau fizic", "Auto-pedepsire Vinovăție", "Curățenie."], "general": ["Cartea 11 semnalează în principal conflicte, argumente, tensiuni și acțiuni repetitive. Principalul ei mesaj este legat de existența unor dispute, certuri sau dezbateri aprinse. Indică o perioadă de frecușuri, discordie sau necesitatea unei confruntări verbale. Poate reprezenta, de asemenea, acțiuni repetitive, rutine sau cicluri care se tot reiau (fie ele constructive, ca exercițiul fizic, fie distructive, ca certurile repetate). Poartă o energie de disciplină (uneori autoimpusă, alteori venită din exterior) și poate indica critică sau chiar pedeapsă. Pe o notă diferită, cartea 11 este puternic asociat cu activitatea fizică intensă, sportul, dar și cu energia sexuală brută și pasiunea. Energia este tensionată, vibrantă, repetitivă, adesea conflictuală, dar și plină de potențial dinamic sau pasional. Este un moment în care conflictele pot ieși la suprafață, tiparele repetitive devin evidente și energia fizică sau sexuală poate fi accentuată. Este necesar să gestionezi tensiunea și să direcționezi energia într-un mod constructiv."], "love": ["Certuri frecvente, conflicte, dispute repetitive în cuplu. Tensiune și dezacorduri. Critici reciproce, discuții aprinse care pot răni. Poate indica o pasiune fizică intensă, o chimie sexuală puternică, uneori chiar cu accente conflictuale sau dominante. Risc de cicluri toxice de ceartă și împăcare sau, în cazuri grave (cu cărți negative puternice), abuz verbal. Nevoia de a aborda problemele repetitive din relație sau de a stabili limite mai clare.", "Poate indica agresiune (verbală sau, în cazuri extreme, fizică) în cuplu."], "career": ["Conflicte cu colegii sau superiorii, dispute legate de sarcini sau opinii. Dezbateri aprinse. Critici la adresa muncii depuse sau un mediu de lucru stresant, cu multă presiune și tensiune. Sarcini repetitive, muncă fizică solicitantă sau rutine de lucru care pot deveni epuizante. Poate indica profesii legate de sport, fitness, armată, poliție (disciplină, efort fizic), drept (dezbateri) sau chiar domenii unde există risc de conflict. Atenție la epuizarea cauzată de stres sau muncă repetitivă."], "health": ["Probleme de sănătate cauzate de stres cronic sau tensiune nervoasă. Afecțiuni legate de mișcări repetitive (ex: tendinite, sindrom de tunel carpian) sau suprasolicitare fizică. Poate indica inflamații, febră (căldură, energie intensă) sau probleme ale corzilor vocale/gâtului (din cauza certurilor). Necesitatea exercițiului fizic regulat pentru eliberarea tensiunii sau, invers, probleme cauzate de excesul de sport. Uneori, poate indica terapii care implică mișcări repetitive (kinetoterapie)."], "money": ["Dispute sau certuri legate de bani (în familie, cu parteneri de afaceri etc.). Probleme financiare repetitive, cicluri de datorii sau cheltuieli necontrolate. Stres major cauzat de situația financiară. Cheltuieli legate de activități sportive, hobby-uri pasionale sau echipamente de fitness."], "home": ["Conflicte frecvente, certuri, tensiuni în familie. Atmosferă domestică încărcată. Posibilă disciplină prea strictă sau, în cazuri negative, risc de abuz verbal sau chiar fizic în cămin. Rutine casnice repetitive și obositoare. Necesitatea de a aborda și rezolva conflictele recurente din familie."], "social": ["Dezacorduri, dispute sau dezbateri aprinse cu prietenii. Critici sau tensiuni în cadrul grupului social. Activități sociale care implică competiție, sport sau discuții pasionale. Posibile conflicte care apar și dispar ciclic în cercul de prieteni."], "travel": ["Călătorii care implică activitate fizică intensă (ex: cantonament sportiv, drumeție solicitantă). Călătorii repetitive (ex: naveta zilnică sau săptămânală). Posibile certuri, tensiuni sau stres în timpul călătoriei (cu partenerii de drum etc.)."], "study": ["Participare activă la dezbateri, seminarii cu discuții intense. Necesitatea unor rutine de studiu disciplinate și repetitive (ex: memorare, exerciții). Stres legat de performanța academică, examene sau termene limită. Potențiale conflicte cu profesorii sau colegii pe teme de studiu."], "spiritual": ["Practici spirituale care implică disciplină riguroasă și repetiție (ex: mantre, rugăciuni repetitive, asane yoga practicate zilnic). Confruntarea cu tipare karmice repetitive sau conflicte interioare care necesită disciplină pentru a fi depășite. Dezbateri filozofice sau spirituale intense. Exprimarea pasională a credințelor. Atenție la tendința de auto-critică sau vinovăție excesivă (auto-flagelare)."], "time": ["Indică acțiuni sau evenimente repetitive, care se întâmplă din nou și din nou, sau rapid în succesiune. Nu se referă la o durată lungă, ci la frecvența sau ciclul evenimentelor. Poate sugera o perioadă de tensiune sau activitate intensă de scurtă durată. Uneori asociată cu cifra 11 sau cu acțiuni duble/repetate."], "advice": ["al Cărții: Gestionează conflictele și canalizează energia! Această carte te avertizează asupra posibilelor dispute, tensiuni sau tipare repetitive. Este important să abordezi conflictele, dar încearcă să o faci constructiv. Fii conștient de rutinele tale și vezi dacă sunt benefice. Folosește energia intensă a acestei cărți pentru activitate fizică sau exprimarea pasiunii într-un mod sănătos și fii atent la tendința spre critică excesivă sau auto-pedepsire. Disciplina poate fi o forță pozitivă dacă este folosită corect. FELICITĂRI! ai aprofundat informațiile despre Cartea 11 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "36": {"intro": ["Cartea numărul 36, Provocările, este o carte cu o greutate deosebită, simbolizând poverile, suferința, încercările vieții, dar și credința, destinul și finalitatea care poate aduce mântuire sau eliberare."], "keywords": ["Povară, Greutate (de dus), Responsabilitate (apăsătoare), Datorie (morală/karmică)", "Suferință, Durere (fizică sau emoțională/sufletească), Tristețe (profundă), Mâhnire", "Hardship, Dificultăți (majore), Încercări, Provocări, Teste (ale vieții/credinței)", "Sacrificiu, Renunțare (necesară, dureroasă), Pierdere (semnificativă)", "Destin, Soartă, Karma (lecții de învățat, datorii de plătit), Inevitabil", "Credință (pusă la încercare sau profundă), Religie, Spiritualitate (aspectul sacrificial/de încercare)", "Criză (existențială, spirituală, de sănătate etc.), Punct culminant (dificil)", "Vinovăție, Pocăință, Ispășire, Remușcare", "Finalitate (dureroasă), Încheiere (a unui ciclu de suferință), Concluzie (grea)", "Salvare, Mântuire, Redențiune (prin credință/sacrificiu - aspect spiritual)", "Durere de spate (literal, uneori)"], "general": ["Cartea 36, Provocările, marchează finalul pachetului și aduce cu sine o energie serioasă și profundă. Este cartea încercărilor majore, a poverilor pe care trebuie să le purtăm și a suferinței, fie ea fizică sau emoțională. Indică o perioadă de dificultate extremă, o provocare majoră sau un test important al rezistenței și al caracterului. Provocările vorbește adesea despre responsabilități grele și datorii (morale, familiale sau chiar karmice) care trebuie asumate și duse la bun sfârșit. Este puternic legată de conceptul de destin sau soartă, sugerând evenimente sau situații care par inevitabile și care trebuie înfruntate. Poate implica sacrificiu personal sau renunțarea la ceva valoros. Pe lângă aceste aspecte dificile, Provocările este și un simbol central al credinței și spiritualității. Ea poate reprezenta religia instituționalizată, credința profundă care ne ajută să traversăm greutățile, sau testarea supremă a acestei credințe. În esență, deși este o carte grea, ea semnifică și faptul că această încercare are un scop și marchează finalul unui ciclu important, deschizând (după traversarea ei) posibilitatea mântuirii sau eliberării. Energia sa este apăsătoare, karmică, predestinată, solicitantă, dar și transcendentală."], "love": ["O relație care a devenit o povară grea, o sursă de suferință constantă.", "Sentimentul de a fi \"crucificat\" într-o relație din datorie, vinovăție sau obligații (ex: față de copii).", "Durere emoțională profundă legată de iubire, posibil doliu, tristețe persistentă.", "Un test major pentru rezistența cuplului. Dificultăți externe sau interne care pun relația la grea încercare.", "Poate indica o legătură karmică dificilă, cu lecții grele de învățat. Necesitatea sacrificiului pentru menținerea relației sau, invers, sacrificiul de a renunța la ea. Poate avea legătură și cu diferențe religioase majore."], "career": ["Un loc de muncă extrem de solicitant și împovărător. Responsabilități care depășesc capacitatea de a le face față. Suferință la locul de muncă.", "Sacrificii enorme făcute pentru carieră, cu prețul sănătății sau al vieții personale.", "O criză profesională majoră, un test de rezistență în fața unor dificultăți extreme.", "Sentimentul de a fi blocat într-un job din datorie, obligații financiare sau lipsa alternativelor, deși provoacă nefericire.", "Poate indica lucrul în domenii religioase, caritabile, paliative sau care implică alinarea suferinței altora. Finalul dureros, dar necesar, al unei etape profesionale."], "health": ["Probleme de sănătate grave, cronice, care devin o povară constantă. Suferință fizică persistentă.", "Boli cu posibilă componentă karmică sau care reprezintă un test major al rezistenței fizice și psihice.", "Poate indica dureri cronice de spate sau de umeri (simbolul purtării crucii).", "Suferință psihică profundă, depresie majoră, sentiment de vinovăție care afectează starea generală.", "Marchează adesea finalul unui proces lung și dificil legat de sănătate, fie el pozitiv (sfârșitul suferinței) sau negativ (sfârșitul luptei). Necesită multă credință."], "money": ["Poveri financiare extrem de grele: datorii masive, lipsuri cronice, dificultăți insurmontabile. Suferință cauzată de bani.", "Necesitatea unor sacrificii financiare dureroase pentru a supraviețui sau a achita datorii.", "Sentimentul că problemele financiare sunt o cruce de dus, o soartă inevitabilă.", "Poate indica donații majore către biserici sau organizații caritabile, ca formă de sacrificiu sau penitență.", "Finalul (adesea dureros) al unei situații financiare (ex: faliment, executare silită)."], "home": ["Responsabilități familiale copleșitoare (îngrijirea părinților foarte bolnavi, probleme grave cu copiii, etc.), resimțite ca o povară grea.", "Suferință profundă sau doliu în familie. Atmosferă apăsătoare, tristă în cămin.", "Sentimentul de a fi constrâns de datorii familiale, sacrificarea propriei vieți pentru familie.", "Rolul central al religiei sau al credinței în viața de familie, fie ca sursă de sprijin, fie ca sursă de conflict (dogmatism)."], "social": ["O prietenie care a devenit o povară grea sau o sursă de suferință și obligații.", "Susținerea unui prieten care trece printr-o perioadă extrem de dificilă, preluând o parte din durerea sa.", "Retragere socială cauzată de propriile suferințe sau de sentimentul de a fi împovărat.", "Sacrificarea timpului sau resurselor pentru a ajuta pe cineva din anturaj.", "Apartenența la grupuri bazate pe credință religioasă comună sau pe suport reciproc în fața greutăților."], "travel": ["Călătorii foarte dificile, pline de obstacole majore și suferință.", "Călătorii făcute strict din datorie sau obligație, adesea în contexte triste (înmormântări, vizitarea bolnavilor).", "Un pelerinaj religios, o călătorie cu scop de ispășire sau sacrificiu.", "Anularea călătoriei din cauza unor circumstanțe potrivnice inevitabile."], "study": ["O perioadă de studiu extrem de grea, resimțită ca o povară, cu eforturi și sacrificii foarte mari.", "Provocări academice majore, teste de anduranță intelectuală și psihologică.", "Studierea unor domenii precum teologia, filozofia religiei, etica, istoria religiilor, studii paliative.", "Finalizarea unui ciclu educațional foarte dificil, obținerea unei diplome cu mare efort. Învățarea unor lecții de viață dure."], "spiritual": ["Cartea centrală a credinței puse la încercare, a testelor spirituale și a întrebărilor despre suferință și destin.", "Confruntarea directă cu karma, cu lecțiile dificile, dar necesare pentru evoluție. Plata datoriilor karmice.", "Găsirea sensului în suferință, transformarea durerii prin credință și acceptare. Mântuire, redențiune.", "Sacrificiul de sine ca practică spirituală. Devotamentul religios absolut. Rugăciunea ca refugiu.", "Poate indica o criză spirituală profundă sau, invers, o credință de nezdruncinat în fața adversității."], "time": ["Indică un punct culminant și adesea final al unei perioade de încercare sau suferință. Sfârșitul unui ciclu karmic/destinat.", "Se referă la ceva inevitabil, predestinat, care se întâmplă acum sau într-un viitor foarte apropiat și marchează un final de etapă.", "Durata este adesea percepută ca fiind lungă (până la acest punct final), dar cartea în sine marchează sfârșitul poverii sau testul final.", "Asociată cu cifra 36."], "advice": ["al Cărții: Această carte semnalează că te afli într-o perioadă de test, presiune sau disconfort – dar aceste provocări nu sunt pedepse, ci antrenamente subtile pentru a te pregăti pentru următorul nivel de maturizare, manifestare sau înțelepciune. Ce te provoacă acum, te pregătește. Rămâi prezent(ă), respiră, și mergi înainte. Provocarea de azi este puterea de mâine. FELICITĂRI! ai aprofundat informațiile despre Cartea 36 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "20": {"intro": ["Cartea numărul 20, Socializarea, ne invită să ieșim din spațiul privat și să pășim în lumea publică, în mijlocul societății și al interacțiunilor sociale. Este cartea comunității, a evenimentelor și a reputației."], "keywords": ["Public, Societate, Comunitate, Lumea exterioară, Oameni (în general)", "Viață socială, Socializare, Întâlniri (publice), Evenimente (culturale, sociale, profesionale)", "Petreceri, Recepții, Concerte, Festivaluri, Târguri, Expoziții, Adunări, Grupuri", "Networking, Conexiuni sociale și profesionale, Clienți, Public, Audiență, Fani", "Reputație, Imagine publică, Vizibilitate, Celebritate (uneori)", "Spații publice, Piețe, Parcuri, Grădini (literal), Terase, Locuri de întâlnire", "Relaxare (în public/natură), Timp liber, Divertisment, Plăcere (împărtășită)", "Cultură, Arte (expuse public), Expoziții", "Publicitate, Marketing, Relații publice, Promovare"], "general": ["Cartea 20, Socializarea, reprezintă sfera publică și interacțiunea cu societatea. Este cartea vieții sociale, a evenimentelor la care participăm și a grupurilor din care facem parte. Semnifică întâlniri, petreceri, concerte, conferințe sau orice altă formă de adunare publică. Pune un accent deosebit pe networking, pe crearea și cultivarea conexiunilor atât în plan personal, cât și profesional. Socializarea vorbește despre comunitate, despre apartenența la un grup mai larg și despre modul în care interacționăm cu acesta. Este direct legată de reputația noastră, de imaginea publică și de felul în care suntem percepuți de publicul larg sau de clientelă. Pe un plan mai concret, se poate referi la spații verzi publice, cum ar fi parcurile sau grădinile, locuri de relaxare și socializare în aer liber. Energia sa este deschisă, socială, extrovertită și orientată spre exterior. Este o invitație la a ieși, a interacționa și a te face văzut."], "love": ["Publicitatea relației: prezentarea partenerului prietenilor/familiei, afișarea în public ca un cuplu.", "Participarea împreună la evenimente sociale: nunți, petreceri, concerte etc. Viață socială activă de cuplu.", "Posibilitatea de a întâlni pe cineva interesant într-un context social, la un eveniment, într-un parc sau online (rețele sociale). Scena de dating.", "Reputația cuplului în cercul social sau în comunitate. Cum sunt percepuți împreună.", "Nevoia de a petrece timp de calitate și în spațiul public, nu doar în intimitate."], "career": ["Importanța networking-ului: participarea la conferințe, evenimente de industrie, întâlniri profesionale pentru a stabili contacte utile.", "Activități de relații publice, marketing, promovare, vânzări, interacțiune directă cu clienții și publicul. Managementul evenimentelor.", "Construirea și menținerea unei reputații profesionale bune. Vizibilitate în domeniul de activitate.", "Lucrul în echipă extinsă, ședințe cu mulți participanți, colaborări publice.", "Profesii care implică interacțiunea constantă cu publicul: ospitalitate, turism, divertisment, vânzări, PR, media, peisagistică, organizare evenimente."], "health": ["Beneficiile ieșirilor în aer liber, ale petrecerii timpului în parcuri și grădini pentru sănătatea fizică și mentală. Relaxare, destindere.", "Importanța suportului social și a conexiunilor cu comunitatea pentru starea de bine. Apartenența la grupuri (ex: grupuri de sport, cluburi).", "Poate indica aspecte legate de sănătatea publică, campanii de informare, evenimente dedicate sănătății.", "Terapii de grup, activități de recuperare sau wellness desfășurate în centre specializate, spa-uri sau în natură."], "money": ["Oportunități financiare care apar prin networking și conexiuni sociale/profesionale.", "Venituri generate din afaceri cu publicul, evenimente, marketing, turism, divertisment. Relația cu clienții este cheia.", "Reputația publică poate influența direct succesul financiar (ex: imaginea unei companii).", "Participarea sau organizarea unor evenimente de strângere de fonduri, sponsorizări, campanii publice.", "Cheltuieli asociate cu viața socială: ieșiri în oraș, bilete la evenimente, vacanțe, divertisment."], "home": ["Literal, grădina sau curtea casei, un spațiu exterior pentru relaxare și socializare. Amenajarea acestui spațiu.", "Organizarea de petreceri în grădină/curte, primirea de oaspeți numeroși, evenimente de familie desfășurate acasă, dar cu caracter public/social.", "Rel iritualității."], "time": ["Se referă adesea la momentul unui eveniment social specific (o petrecere, o conferință).", "Poate indica anotimpurile prielnice activităților exterioare: primăvara, vara.", "Sugerează o perioadă de socializare intensă sau de expunere publică.", "Nu are o durată fixă, dar este legată de contextul public sau de evenimente. Asocieri posibile cu cifra 20."], "advice": ["al Cărții: Conectează-te cu lumea din jur și cultivă-ți prezența publică! Socializarea te încurajează să ieși din spațiul privat, să socializezi, să participi la viața comunității și să construiești relații. Fii deschis la noi întâlniri, profită de oportunitățile de networking și fii conștient de imaginea pe care o proiectezi. Este timpul să te bucuri de compania celorlalți și de plăcerile vieții sociale! FELICITĂRI! ai aprofundat informațiile despre Cartea 20 acum ești pregătit să îți testezi cunoștințele pentru a trece la nivelul următor! Succes"]}, "25": {"intro": ["Cartea numărul 25, Angajamentul, este simbolul primordial al uniunii, parteneriatului și al contractelor. Forma circulară a inelului vorbește despre legături, cicluri și continuitate."], "keywords": ["Angajament, Promisiune, Legământ, Jurământ, Obligație (asumată)", "Parteneriat (în dragoste, afaceri), Uniune, Asociere, Alianță, Colaborare", "Contract, Acord, Înțelegere (formală sau informală), Pact, Tratat", "Căsătorie, Logodnă, Relație stabilă și angajată, Cuplu (ca unitate)", "Legătură (puternică, care unește), Conexiune (durabilă, oficializată)", "Ciclu, Repetiție, Ceva care se reia, Rutină (circulară), Tipar recurent", "Completare, Împlinire (a unui ciclu sau angajament), Finalizare (a unui acord)", "Loialitate (prin angajament), Fidelitate (în parteneriat), Devotament (în uniune)", "Responsabilități (asumate prin acord), Îndatoriri contractuale", "Bijuterii (literal, în special inele), Obiecte de valoare (circulare), Moșteniri (bijuterii)", "Garanție, Asigurare (printr-un acord)"], "general": ["Cartea 25,
